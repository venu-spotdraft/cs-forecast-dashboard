<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS/AM Forecast Dashboard — FY27</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232636;--border:#2e3248;--accent:#6c63ff;--accent2:#00d4aa;--text:#e8eaf0;--muted:#8b90a8;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;--purple:#a855f7;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh;overflow-y:scroll;}
  .hdr{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:1px solid var(--border);padding:14px 32px 0;position:sticky;top:0;z-index:100;}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;}
  .hdr-nav{display:flex;align-items:center;gap:8px;padding:6px 32px 10px;}
  .hdr h1{font-size:20px;font-weight:700;}.hdr p{font-size:12px;color:var(--muted);margin-top:3px;}
  .hdr-meta{display:flex;align-items:center;gap:10px;}
  .hdr-tools{display:flex;align-items:center;gap:10px;}
  .badge{background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;}
  .icon-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .2s;}
  .icon-btn:hover{border-color:var(--accent);color:var(--text);}
  .last-updated{font-size:11px;color:var(--muted);}
  .qtabs{display:flex;gap:6px;padding:20px 32px 14px;background:var(--bg);align-items:center;justify-content:space-between;}
  .qtab{padding:5px 14px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:8px;background:var(--surface2);border:1px solid var(--border);transition:all .2s;}
  .qtab:hover{color:var(--text);border-color:var(--accent);}.qtab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .sumbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 32px;}
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
  .sc.hi{border-color:var(--accent);}
  .sc .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
  .sc .v{font-size:22px;font-weight:700;}.sc .s{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.6;}
  .tsec{padding:0 32px 40px;}.ttl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;padding-top:4px;}
  .mwrap{border-radius:12px;border:1px solid var(--border);overflow:hidden;}
  table{width:100%;border-collapse:collapse;background:var(--surface);font-size:13px;}
  thead th{background:var(--surface2);padding:12px 16px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;}
  thead th:first-child{text-align:left;min-width:160px;}
  tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover:not(.trow){background:rgba(108,99,255,.06);}
  tbody td{padding:14px 16px;text-align:center;vertical-align:middle;}
  tbody td:first-child{text-align:left;}
  .pn{display:flex;align-items:center;gap:10px;cursor:pointer;}
  .pa{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
  .pm{font-size:10px;color:var(--muted);font-weight:400;margin-top:2px;}
  .av{font-weight:600;color:var(--text);}
  .chip{display:inline-flex;align-items:center;justify-content:center;min-width:72px;padding:6px 10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:transform .1s;}
  .chip:hover{transform:translateY(-1px);}
  .chip.green{background:rgba(34,197,94,.15);color:#22c55e;}
  .chip.yellow{background:rgba(245,158,11,.15);color:#f59e0b;}
  .chip.red{background:rgba(239,68,68,.15);color:#ef4444;}
  .chip.na{background:rgba(255,255,255,.04);color:var(--muted);font-weight:400;font-size:12px;cursor:default;}
  tr.trow td{font-weight:700;background:var(--surface2);border-top:2px solid var(--border);}
  tr.trow td:first-child{color:var(--accent);font-size:12px;letter-spacing:.5px;font-weight:800;text-transform:uppercase;}
  /* Modal */
  .mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;backdrop-filter:blur(6px);align-items:center;justify-content:center;}
  .mover.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:94%;max-width:1200px;height:78vh;display:flex;flex-direction:column;overflow:hidden;}
  .mh{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;}
  .mh h2{font-size:18px;font-weight:700;letter-spacing:-.2px;}.mh .ms{font-size:12px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:8px;}
  .mc2{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
  .mc2:hover{background:var(--border);color:var(--text);}
  .mtbs{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);padding:0 24px;}
  .mtb{padding:10px 20px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
  .mtb.active{color:var(--accent);border-bottom-color:var(--accent);}
  .mb{overflow-y:auto;padding:20px 24px;flex:1;}
  .mg{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px;}
  .mbox{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
  .mbox .ml{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;}
  .mbox .mv{font-size:18px;font-weight:700;}
  .mbox .mv.green{color:var(--green);}.mbox .mv.yellow{color:var(--yellow);}.mbox .mv.red{color:var(--red);}.mbox .mv.blue{color:var(--blue);}
  .dw{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
  .dt{width:100%;border-collapse:collapse;font-size:12px;min-width:860px;}
  .dt th{background:var(--surface2);padding:10px 14px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
  .dt td{padding:11px 14px;border-bottom:1px solid rgba(46,50,72,.5);vertical-align:middle;font-size:12px;text-align:left;}
  .dt tr:last-child td{border-bottom:none;}.dt tr:hover td{background:rgba(108,99,255,.05);}
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;}
  .tag.rn{background:rgba(34,197,94,.15);color:var(--green);}.tag.cm{background:rgba(59,130,246,.15);color:var(--blue);}
  .tag.tg{background:rgba(245,158,11,.15);color:var(--yellow);}.tag.ch{background:rgba(239,68,68,.15);color:var(--red);}
  .tag.pp{background:rgba(139,144,168,.12);color:var(--muted);}.tag.bc{background:rgba(168,85,247,.15);color:var(--purple);}
  .tag.cw{background:rgba(0,212,170,.15);color:var(--accent2);}.tag.dn{background:rgba(249,115,22,.15);color:var(--orange);}
  .tag.ot{background:rgba(139,144,168,.08);color:var(--muted);font-style:italic;}
  .empty{text-align:center;padding:48px;color:var(--muted);}
  /* Setup / loading */
  .setup{display:flex;align-items:center;justify-content:center;min-height:70vh;padding:32px;}
  .setup-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:560px;width:100%;text-align:center;}
  .setup-card h2{font-size:20px;font-weight:700;margin-bottom:8px;}
  .setup-card p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:24px;}
  .setup-steps{text-align:left;background:var(--surface2);border-radius:10px;padding:16px 20px;margin-bottom:24px;font-size:12px;color:var(--muted);line-height:2;}
  .setup-steps b{color:var(--text);}
  .url-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:13px;outline:none;margin-bottom:8px;}
  .url-input:focus{border-color:var(--accent);}
  .url-input::placeholder{color:var(--muted);}
  .save-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:8px;}
  .save-btn:hover{opacity:.9;}
  .err-msg{color:var(--red);font-size:12px;margin-top:4px;min-height:16px;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;}
  .loading-text{font-size:14px;color:var(--muted);}
  /* Data quality */
  .dq-summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
  .dq-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:130px;cursor:pointer;transition:all .2s;}
  .dq-card:hover{border-color:var(--accent);}
  .dq-card.active-filter{border-color:var(--accent);background:rgba(108,99,255,.1);}
  .dq-card .dqc-n{font-size:22px;font-weight:700;margin-bottom:2px;}
  .dq-card .dqc-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .dq-sev-high{color:var(--red);}
  .dq-sev-med{color:var(--yellow);}
  .dq-sev-low{color:var(--muted);}
  .sev-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;flex-shrink:0;}
  .sev-dot.high{background:var(--red);}
  .sev-dot.med{background:var(--yellow);}
  .sev-dot.low{background:var(--muted);}
  /* Nav tabs (Dashboard / Log) */
  .nav-tabs{display:flex;gap:2px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;}
  .nav-tab{padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted);border-radius:7px;cursor:pointer;transition:all .2s;position:relative;}
  .nav-tab:hover{color:var(--text);}
  .nav-tab.active{background:var(--accent);color:#fff;}
  .nbadge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
  /* Log page */
  .log-page{padding:24px 32px 48px;}
  .log-filters{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
  .log-filters select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:7px 10px;border-radius:8px;outline:none;cursor:pointer;}
  .log-filters select:focus{border-color:var(--accent);}
  .log-filters .flab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .log-actions{margin-left:auto;display:flex;gap:8px;}
  .log-clear{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:6px 12px;border-radius:7px;cursor:pointer;}
  .log-clear:hover{border-color:var(--red);color:var(--red);}
  .arrow-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;}
  .arrow-chip .old{background:rgba(139,144,168,.15);color:var(--muted);padding:2px 7px;border-radius:4px;}
  .arrow-chip .arr{color:var(--muted);}
  .arrow-chip .new{padding:2px 7px;border-radius:4px;}
  .log-empty{text-align:center;padding:64px;color:var(--muted);}
  .log-empty .le-icon{font-size:36px;margin-bottom:12px;}
  .log-empty p{font-size:13px;line-height:1.7;}
  .log-count{font-size:11px;color:var(--muted);margin-bottom:12px;}
  /* Scenario panel */
  .scen-panel{margin:0 32px 0;background:var(--surface);border:1px solid var(--accent);border-radius:14px;overflow:hidden;}
  .scen-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(108,99,255,.1);border-bottom:1px solid var(--border);}
  .scen-hdr-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--accent);}
  .scen-active-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
  .scen-reset{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 12px;border-radius:7px;cursor:pointer;}
  .scen-reset:hover{border-color:var(--red);color:var(--red);}
  .scen-body{padding:14px 20px;}
  .scen-tbl{border-collapse:collapse;width:auto;}
  .scen-tbl th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:4px 28px;text-align:center;}
  .scen-tbl th:first-child{text-align:left;padding-left:0;min-width:100px;}
  .scen-section-row td{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;padding:12px 0 5px;border-bottom:1px solid var(--border);}
  .scen-section-row:first-child td{padding-top:0;}
  .scen-row td{padding:7px 28px;text-align:center;vertical-align:middle;}
  .scen-row td:first-child{text-align:left;padding-left:0;font-size:12px;font-weight:500;color:var(--text);}
  .scen-rdot{display:inline-block;width:16px;height:16px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:all .15s;vertical-align:middle;}
  .scen-rdot:hover{border-color:var(--muted);}
  .scen-rdot.sn{border-color:var(--muted);box-shadow:inset 0 0 0 4px var(--muted);}
  .scen-rdot.sw{border-color:var(--green);box-shadow:inset 0 0 0 4px var(--green);}
  .scen-rdot.sl{border-color:var(--red);box-shadow:inset 0 0 0 4px var(--red);}
  .scen-result{padding:14px 20px;background:var(--surface2);border-top:1px solid var(--border);display:flex;gap:24px;flex-wrap:wrap;align-items:center;}
  .sr-item{display:flex;flex-direction:column;gap:2px;}
  .sr-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .sr-val{font-size:20px;font-weight:700;}
  .sr-delta{font-size:11px;margin-top:1px;}
  .sr-sep{width:1px;background:var(--border);align-self:stretch;}
  .scen-col{background:rgba(108,99,255,.08)!important;}
  th.scen-col{color:var(--accent)!important;}
  .active-view{border-color:var(--accent);color:var(--accent);}
  .ovr-active { background: rgba(108,99,255,.05); }
  .tag.r{background:rgba(59,130,246,.15);color:var(--blue);}
  .tag.u{background:rgba(0,212,170,.15);color:var(--accent2);}
  .tag.pod{background:rgba(108,99,255,.12);color:var(--accent);}
  .tbl{width:100%;border-collapse:collapse;background:var(--surface);font-size:13px;}
  .tbl th{background:var(--surface2);padding:10px 12px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
  .tbl td{padding:10px 12px;border-bottom:1px solid rgba(46,50,72,.5);vertical-align:middle;text-align:left;}
  .tbl tr:last-child td{border-bottom:none;}.tbl tr:hover td{background:rgba(108,99,255,.04);}
</style>
</head>
<body>

<div class="hdr" style="display:flex;align-items:center;padding:0 32px;height:68px;position:relative">
  <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
    <h1>CS/AM Forecast Dashboard</h1>
    <span class="badge">FY27</span>
  </div>
  <!-- hidden log nav kept for badge tracking -->
  <div style="display:none"><div id="navLog"><span class="nbadge" id="logBadge">0</span></div><span class="nbadge" id="dqBadge">0</span></div>
  <!-- Centered ALL / CSM / AM toggle -->
  <div style="position:absolute;left:50%;transform:translateX(-50%);display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:12px;font-weight:700">
    <div id="toggleCS" onclick="csmView=false;switchPage('dashboard')" style="padding:5px 14px;cursor:pointer;background:var(--accent);color:#fff;transition:all .2s">ALL</div>
    <div id="toggleCSM" onclick="csmView=true;switchPage('dashboard');const _ob=document.getElementById('ovrNavBtn'),_os=document.getElementById('ovrNavSep');if(_ob)_ob.style.display='';if(_os)_os.style.display='';" style="padding:5px 14px;cursor:pointer;color:var(--muted);transition:all .2s;border-left:1px solid var(--border)">CSM</div>
    <div id="toggleAM" onclick="switchPage('am')" style="padding:5px 14px;cursor:pointer;color:var(--muted);transition:all .2s;border-left:1px solid var(--border)">AM</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto">
    <button class="icon-btn" id="scenBtn" onclick="toggleScenario()" style="border-color:transparent">⚡ What-If</button>
    <div id="scenSep" style="width:1px;height:22px;background:var(--border);margin:0 2px"></div>
    <button class="icon-btn" id="ovrNavBtn" onclick="switchPage('overrides')" style="display:none">Overrides</button>
    <div id="ovrNavSep" style="width:1px;height:22px;background:var(--border);margin:0 2px;display:none"></div>
    <button class="icon-btn" onclick="switchPage('quality')">Data Hygiene</button>
    <div style="width:1px;height:22px;background:var(--border);margin:0 2px"></div>
    <button class="icon-btn" onclick="loadData(true)">↻ Refresh</button>
  </div>
</div>

<div id="app"></div>
<div id="pageFooter" style="display:none;padding:10px 32px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">
  <span id="lastUpdated"></span>
</div>

<div class="mover" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mh">
      <div><h2 id="mTitle"></h2><div class="ms" id="mSub"></div></div>
      <button class="mc2" onclick="closeModal()">✕</button>
    </div>
    <div class="mtbs">
      <div class="mtb active" id="tab-r" onclick="switchTab('r')">Renewal Deals</div>
      <div class="mtb" id="tab-u" onclick="switchTab('u')">Upsell Deals</div>
    </div>
    <div class="mb" id="mBody"></div>
  </div>
</div>

<script>
const POD_COLORS={'Rahul':'#6c63ff','Alice':'#00d4aa','Muskan':'#f97316','Abhilash':'#3b82f6'};
const URL_KEY='cs_forecast_script_url';
const DEFAULT_URL='https://script.google.com/a/macros/spotdraft.com/s/AKfycbyGBoKlNXU8M2Yg1YgC84H-oZ6-sAqioN7KKlgkduZ6SmXrvV3kyynrC-1Ma-5vwBhH/exec';
const HS_PORTAL_KEY='cs_hs_portal';
const HS_PORTAL_ID='7712708';
const CACHE_KEY='cs_forecast_data_v2';
const CACHE_TTL=4*60*60*1000;
const LOG_KEY='cs_forecast_log_v1';
const SNAP_KEY='cs_forecast_snap_v1';

let DATA=null,activeQ='Q1-FY2027',modalPod=null,modalQ=null,modalTab='r',modalFilter=null;
let modalCSM=null;
let amDrillParams=null;
let activePage='dashboard';
let overrideMode=false;
let overrideAuth=null; // {podLead:'Rahul'} when authed, null otherwise
const OVERRIDE_PIN='Lead2027';
const POD_LEADS_LIST=Object.keys(POD_COLORS);
// log filter state
let logFilterPod='',logFilterQ='',logFilterCat='',logFilterType='';
// scenario state
let scenarioOpen=false;
// AM page state
let amMonthlyTarget=250000;
let amPodFilter='';
// CSM view state
let csmView=false,csmFilterCSM='',csmFilterPod='';
const scenario={renewalTNG:'neutral',renewalCommit:'neutral',upsellTNG:'neutral',upsellBC:'neutral',upsellCommit:'neutral'};

window.onload=()=>{
  updateLogBadge();
  try{const saved=sessionStorage.getItem('ovrAuth');if(saved)overrideAuth=JSON.parse(saved);}catch(e){}
  const u=localStorage.getItem(URL_KEY);
  if(!u){localStorage.setItem(URL_KEY,DEFAULT_URL);}
  loadData(false);
};

// ── JSONP fetch (avoids Apps Script CORS redirect issue) ──────────────────────
function fetchJSONP(url){
  return new Promise((resolve,reject)=>{
    const cbName='_jcb'+Date.now();
    const script=document.createElement('script');
    const timeout=setTimeout(()=>{cleanup();reject(new Error('Timeout — Apps Script took too long'));},30000);
    function cleanup(){delete window[cbName];if(script.parentNode)document.head.removeChild(script);}
    window[cbName]=function(data){clearTimeout(timeout);cleanup();resolve(data);};
    script.onerror=()=>{clearTimeout(timeout);cleanup();reject(new Error('Script load failed — check URL and deployment'));};
    script.src=url+(url.includes('?')?'&':'?')+'callback='+cbName;
    document.head.appendChild(script);
  });
}

// ── Setup ─────────────────────────────────────────────────────────────────────
function showSetup(){

  document.getElementById('app').innerHTML=`
    <div class="setup"><div class="setup-card">
      <h2>Connect to HubSpot</h2>
      <p>Paste your Google Apps Script web app URL below.<br>Saved in your browser — one-time setup.</p>
      <div class="setup-steps">
        <b>How to get the URL:</b><br>
        1. Open Google Sheet → <b>Extensions → Apps Script</b><br>
        2. Paste Code.gs content → <b>Cmd+S</b><br>
        3. <b>Deploy → New deployment</b><br>
        4. Type: Web app · Execute as: Me · Access: <b>Anyone</b><br>
        5. Deploy → copy URL → paste below
      </div>
      <input class="url-input" id="urlInput" type="text"
        placeholder="https://script.google.com/macros/s/.../exec"
        value="${saved}"/>
      <div style="margin-top:16px;margin-bottom:4px;font-size:12px;color:var(--muted);font-weight:600">HUBSPOT PORTAL ID <span style="font-weight:400;opacity:.6">(optional — enables clickable deal links in Data Quality)</span></div>

function saveUrl(){
  const url=(document.getElementById('urlInput').value||'').trim();
  if(!url.startsWith('https://script.google.com')){
    document.getElementById('urlErr').textContent='Please enter a valid Apps Script URL';
    return;
  }
  localStorage.setItem(URL_KEY,url);
  const hsPortalVal=(document.getElementById('hsPortalInput')?.value||'').trim();
  if(hsPortalVal) localStorage.setItem(HS_PORTAL_KEY,hsPortalVal);
  loadData(true);
}

// ── Auto-clean stale overrides ────────────────────────────────────────────────
// If a deal is now closed/churned/renewed/1x but still has an override record,
// silently delete it from Google Sheets and clear it in memory.
function autoCleanStaleOverrides_(){
  const url=localStorage.getItem(URL_KEY);
  if(!url||!DATA) return;
  const stale=[];
  (DATA.renewalDeals||[]).forEach(d=>{
    const hasOvr=!!(d.overrideFC||(d.overrideAmount!==null&&d.overrideAmount!==undefined&&d.overrideAmount!=='')||d.overrideMonth);
    if(!hasOvr) return;
    const stL=(d.dealStage||'').toLowerCase();
    if(stL==='renewed'||stL==='churned') stale.push({...d,_type:'Renewal'});
  });
  (DATA.upsellDeals||[]).forEach(d=>{
    const hasOvr=!!(d.overrideFC||(d.overrideAmount!==null&&d.overrideAmount!==undefined&&d.overrideAmount!=='')||d.overrideMonth);
    if(!hasOvr) return;
    const stL=(d.dealStage||'').toLowerCase();
    const is1x=d.oneTimeFee===true||(d.oneTimeFeeRaw||'').toLowerCase()==='yes';
    if(stL==='closed won'||stL==='closed lost'||is1x) stale.push({...d,_type:'Upsell'});
  });
  if(!stale.length) return;
  stale.forEach(d=>{
    // Clear in-memory immediately
    const arr=d._type==='Renewal'?DATA.renewalDeals:DATA.upsellDeals;
    const rec=arr.find(x=>x.dealId===d.dealId);
    if(rec){rec.overrideFC='';rec.overrideAmount=null;rec.overrideMonth='';rec.overrideBy='';rec.overrideAt='';}
    // Delete from Google Sheets via JSONP
    const body={dealId:d.dealId,dealType:d._type,action:'clear',overrideBy:'auto-clean',
                company:d.company||'',quarter:d.fiscalQuarter||activeQ,
                oldFC:d.overrideFC||'',oldAmount:d.overrideAmount!=null?d.overrideAmount:'',oldMonth:d.overrideMonth||''};
    const cbName='csfc_ac_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    window[cbName]=()=>{try{delete window[cbName];script.parentNode&&script.parentNode.removeChild(script);}catch(e){}};
    script.onerror=()=>{try{delete window[cbName];script.parentNode&&script.parentNode.removeChild(script);}catch(e){}};
    script.src=url+(url.includes('?')?'&':'?')+new URLSearchParams({action:'writeOverride',payload:JSON.stringify(body),callback:cbName}).toString();
    document.head.appendChild(script);
    setTimeout(()=>{try{delete window[cbName];script.parentNode&&script.parentNode.removeChild(script);}catch(e){}},10000);
  });
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadData(forceRefresh){
  const url=localStorage.getItem(URL_KEY);
  if(!url){showSetup();return;}
  if(!forceRefresh){const c=loadCache();if(c){DATA=c;autoCleanStaleOverrides_();updateDQBadge(runDQChecks().length);if(activePage==='log')renderLog();else if(activePage==='quality')renderQuality();else if(activePage==='overrides')renderOverrides();else if(activePage==='am')renderAM();else render();return;}}
  document.getElementById('app').innerHTML=`
    <div class="loading-screen"><div class="spinner"></div>
    <div class="loading-text">Fetching live data from HubSpot…</div></div>`;
  try{
    const json=await fetchJSONP(url);
    if(json.error) throw new Error(json.error);
    // Detect FC changes before saving new snapshot
    detectChanges(json);
    DATA=json;saveCache(DATA);
    autoCleanStaleOverrides_();
    // overrideToggle moved to qtabs row in render()
    updateDQBadge(runDQChecks().length);
    if(activePage==='log')renderLog();else if(activePage==='quality')renderQuality();else if(activePage==='overrides')renderOverrides();else if(activePage==='am')renderAM();else render();
  }catch(err){
    document.getElementById('app').innerHTML=`
      <div class="setup"><div class="setup-card">
        <h2 style="color:var(--red)">Failed to load data</h2>
        <p style="margin-bottom:16px">Error: <code style="color:var(--text)">${err.message}</code></p>
        <p>Most likely fix: go to Apps Script → <b>Deploy → Manage deployments</b> → edit → set version to <b>New version</b> → Deploy again.</p>
        <button class="save-btn" style="margin-top:20px;background:var(--surface2);border:1px solid var(--border)" onclick="showSetup()">Update URL</button>
      </div></div>`;
  }
}

function saveCache(d){try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),data:d}));}catch(_){}}
function loadCache(){try{const r=localStorage.getItem(CACHE_KEY);if(!r)return null;const{ts,data}=JSON.parse(r);return Date.now()-ts>CACHE_TTL?null:data;}catch(_){return null;}}

// ── Scenario helpers ──────────────────────────────────────────────────────────
function sMult(state,std){return state==='won'?1.0:state==='lost'?0:std;}
function isScenActive(){return Object.values(scenario).some(v=>v!=='neutral');}

function computeScen(b){
  const ra=b.renewableARR||0;
  if(!ra)return null;
  const gNum=(b.renewedARR||0)+(b.renewalCommit||0)*sMult(scenario.renewalCommit,1)+
             (b.renewalTNG||0)*sMult(scenario.renewalTNG,0.75)+(b.downgradedARR||0);
  const nNum=gNum+(b.upsellClosedWon||0)+
             (b.upsellCommit||0)*sMult(scenario.upsellCommit,1)+
             (b.upsellTNG||0)*sMult(scenario.upsellTNG,0.75)+
             (b.upsellBestCase||0)*sMult(scenario.upsellBC,0.5);
  return{grr:gNum/ra,nrr:nNum/ra,nrrNum:nNum,grrNum:gNum};
}

  const btn=document.getElementById('scenBtn');

function resetScenario(){

// ── Change detection ──────────────────────────────────────────────────────────
function buildSnapshot(data){
  const snap={};
  (data.renewalDeals||[]).forEach(d=>{
    const k=`${d.company}|r|${d.fiscalQuarter}`;
    snap[k]={fc:d.forecastCategory,stage:d.dealStage,amount:d.amount,pod:d.podLead};
  });
  (data.upsellDeals||[]).forEach(d=>{
    const k=`${d.company}|u|${d.fiscalQuarter}`;
    snap[k]={fc:d.forecastCategory,stage:d.dealStage,amount:d.effectiveARR||d.amount,pod:d.podLead};
  });
  return snap;
}

function detectChanges(newData){
  const newSnap=buildSnapshot(newData);
  let oldSnap={};
  try{const s=localStorage.getItem(SNAP_KEY);if(s)oldSnap=JSON.parse(s);}catch(_){}

  const log=loadLog();
  const now=new Date().toISOString();
  let added=0;

  for(const[k,nv] of Object.entries(newSnap)){
    const ov=oldSnap[k];
    if(!ov) continue; // new deal, no history to compare
    const oldFC=(ov.fc||'').trim().toLowerCase();
    const newFC=(nv.fc||'').trim().toLowerCase();
    if(oldFC===newFC) continue; // no change
    const[company,type,quarter]=k.split('|');
    log.unshift({
      id:now+'_'+Math.random().toString(36).slice(2,7),
      detectedAt:now,
      company,
      podLead:nv.pod||ov.pod||'',
      fiscalQuarter:quarter,
      dealType:type==='r'?'Renewal':'Upsell',
      oldFC:ov.fc||'',
      newFC:nv.fc||'',
      amount:nv.amount||0
    });
    added++;
  }

  // Save new snapshot and log (cap log at 500 entries)
  try{
    localStorage.setItem(SNAP_KEY,JSON.stringify(newSnap));
    localStorage.setItem(LOG_KEY,JSON.stringify(log.slice(0,2000)));
  }catch(_){}

  if(added>0) updateLogBadge(added);
}

function loadLog(){
  try{const s=localStorage.getItem(LOG_KEY);return s?JSON.parse(s):[];}catch(_){return[];}
}

function updateLogBadge(delta){
  // Show unread count stored separately
  let unread=0;
  try{unread=parseInt(localStorage.getItem('cs_log_unread')||'0',10);}catch(_){}
  if(delta) unread+=delta;
  if(delta!==undefined) try{localStorage.setItem('cs_log_unread',String(unread));}catch(_){}
  const badge=document.getElementById('logBadge');
  if(!badge)return;
  if(unread>0){badge.textContent=unread>99?'99+':String(unread);badge.style.display='flex';}
  else{badge.style.display='none';}
}

function clearUnread(){
  try{localStorage.setItem('cs_log_unread','0');}catch(_){}
  updateLogBadge();
}

// ── Data Quality ──────────────────────────────────────────────────────────────
let dqFilterIssue='',dqFilterPod='',dqFilterQ='',dqFilterType='',dqSort='sev_company';

function updateDQBadge(n){
  // Badge number hidden; DQ issues visible on Data Quality page
}

function runDQChecks(){
  const issues=[];
  const today=new Date();today.setHours(0,0,0,0);
  // Parse DD/MM/YYYY correctly (new Date("01/07/2026") is parsed as Jan 7 in JS — wrong)
  function isPastDate(ds){
    if(!ds||ds==='')return false;
    const p=ds.split('/');if(p.length!==3)return false;
    const d=new Date(+p[2],+p[1]-1,+p[0]);
    return !isNaN(d.getTime())&&d.getFullYear()>=2000&&d<today;
  }

  // ── Renewal checks ──
  const rSeen={};
  for(const d of (DATA.renewalDeals||[])){
    // Skip closed/completed deals — no DQ flags needed
    const rStageL=(d.dealStage||'').toLowerCase();
    if(rStageL==='renewed'||rStageL==='churned') continue;
    const base={dealType:'Renewal',company:d.company,owner:d.dealOwner||'',pod:d.podLead||'',
                quarter:d.fiscalQuarter,stage:d.dealStage,fc:d.forecastCategory,
                dealId:d.dealId||'',dealName:d.dealName||'',
                amount:d.amount,closeDate:d.closeDate};
    if(!d.dealOwner||d.dealOwner.trim()==='')
      issues.push({...base,issue:'Blank Deal Owner',sev:'high'});
    if(!d.podLead||d.podLead.trim()==='')
      issues.push({...base,issue:'Blank Pod Lead',sev:'high'});
    else if(!POD_LEADS_LIST.includes(d.podLead.trim()))
      issues.push({...base,issue:'Unknown Pod Lead',sev:'high'});
    if((!d.forecastCategory||d.forecastCategory.trim()==='')&&d.dealStage!=='Renewed'&&d.dealStage!=='Churned')
      issues.push({...base,issue:'Blank Forecast Category',sev:'high'});
    if(!d.amount||d.amount===0)
      issues.push({...base,issue:'Blank / Zero Amount',sev:'high'});
    if(isPastDate(d.closeDate))
      issues.push({...base,issue:'Past Close Date (still active)',sev:'med'});
    // duplicate detection
    const dupKey=`${(d.company||'').toLowerCase()}|${d.fiscalQuarter}|${d.dealOwner||''}`;
    rSeen[dupKey]=(rSeen[dupKey]||0)+1;
    d.__dKey=dupKey;
  }
  for(const d of (DATA.renewalDeals||[])){
    if(rSeen[d.__dKey]>1)
      issues.push({dealType:'Renewal',company:d.company,owner:d.dealOwner||'',pod:d.podLead||'',
                   quarter:d.fiscalQuarter,stage:d.dealStage,fc:d.forecastCategory,
                   dealId:d.dealId||'',dealName:d.dealName||'',
                   amount:d.amount,closeDate:d.closeDate,issue:'Possible Duplicate',sev:'med'});
  }

  // ── Upsell checks ──
  const uSeen={};
  for(const d of (DATA.upsellDeals||[])){
    // Skip closed deals — no DQ flags needed (case-insensitive)
    const uStageL=(d.dealStage||'').toLowerCase();
    if(uStageL==='closed won'||uStageL==='closed lost') continue;
    const base={dealType:'Upsell',company:d.company,owner:d.dealOwner||'',pod:d.podLead||'',
                quarter:d.fiscalQuarter,stage:d.dealStage,fc:d.forecastCategory,
                upsellType:d.upsellType||'',
                dealId:d.dealId||'',dealName:d.dealName||'',
                amount:d.effectiveARR||d.amount,closeDate:d.closeDate};
    if(!d.dealOwner||d.dealOwner.trim()==='')
      issues.push({...base,issue:'Blank Deal Owner',sev:'high'});
    if(!d.podLead||d.podLead.trim()==='')
      issues.push({...base,issue:'Blank Pod Lead',sev:'high'});
    else if(!POD_LEADS_LIST.includes(d.podLead.trim()))
      issues.push({...base,issue:'Unknown Pod Lead',sev:'high'});
    // One-time fee: if oneTimeFeeRaw is present in data (new field), check it's not blank
    if('oneTimeFeeRaw' in d && (!d.oneTimeFeeRaw||d.oneTimeFeeRaw.trim()===''))
      issues.push({...base,issue:'One-Time Fee Not Set',sev:'high'});
    if((!d.forecastCategory||d.forecastCategory.trim()==='')&&uStageL!=='closed won'&&uStageL!=='closed lost')
      issues.push({...base,issue:'Blank Forecast Category',sev:'high'});
    if(!d.amount||d.amount===0)
      issues.push({...base,issue:'Blank / Zero Amount',sev:'high'});
    if('upsellType' in d&&(!d.upsellType||d.upsellType.trim()===''))
      issues.push({...base,issue:'Upsell Type Not Set',sev:'med'});
    if('amQualified' in d){
      const amqv=d.amQualified;
      if(amqv===null||amqv===undefined||(typeof amqv==='string'&&amqv.trim()===''))
        issues.push({...base,issue:'AM Qualified Blank',sev:'med'});
    }
    if('ledBy' in d){
      const lbv=d.ledBy;
      if(lbv===null||lbv===undefined||(typeof lbv==='string'&&lbv.trim()===''))
        issues.push({...base,issue:'Led By Blank',sev:'med'});
    }
    if(isPastDate(d.closeDate))
      issues.push({...base,issue:'Past Close Date (still active)',sev:'med'});
    // duplicate: same company + quarter + stage + owner + upsell type
    const dupKey=`${(d.company||'').toLowerCase()}|${d.fiscalQuarter}|${d.dealStage||''}|${d.dealOwner||''}|${d.upsellType||''}`;
    uSeen[dupKey]=(uSeen[dupKey]||0)+1;
    d.__dKey=dupKey;
  }
  for(const d of (DATA.upsellDeals||[])){
    if(uSeen[d.__dKey]>1)
      issues.push({dealType:'Upsell',company:d.company,owner:d.dealOwner||'',pod:d.podLead||'',
                   quarter:d.fiscalQuarter,stage:d.dealStage,fc:d.forecastCategory,
                   upsellType:d.upsellType||'',dealId:d.dealId||'',dealName:d.dealName||'',
                   amount:d.effectiveARR||d.amount,closeDate:d.closeDate,issue:'Possible Duplicate',sev:'med'});
  }

  // ── Unassigned pod deals (excluded from forecasts entirely) ──
  for(const d of (DATA.unassignedDeals||[])){
    issues.push({
      dealType:d.dealType,
      company:d.company,
      owner:d.dealOwner||'',
      pod:d.podLead||'',
      quarter:d.fiscalQuarter,
      stage:d.dealStage,
      fc:d.forecastCategory,
      upsellType:d.upsellType||'',
      dealId:d.dealId||'',
      dealName:d.dealName||'',
      amount:d.amount,
      closeDate:d.closeDate,
      issue:'No Pod Lead Assigned',
      sev:'high'
    });
  }

  return issues;
}

const SEV_ORDER={high:0,med:1,low:2};
const ISSUE_META={
  'No Pod Lead Assigned':{sev:'high',icon:'🚨'},
  'Blank Deal Owner':{sev:'high',icon:'👤'},
  'Blank Pod Lead':{sev:'high',icon:'🏠'},
  'Unknown Pod Lead':{sev:'high',icon:'❓'},
  'One-Time Fee Not Set':{sev:'high',icon:'💲'},
  'Blank Forecast Category':{sev:'high',icon:'🏷'},
  'Blank / Zero Amount':{sev:'high',icon:'💰'},
  'Upsell Type Not Set':{sev:'med',icon:'📋'},
  'AM Qualified Blank':{sev:'med',icon:'🙋'},
  'Led By Blank':{sev:'med',icon:'👆'},
  'Past Close Date (still active)':{sev:'med',icon:'📅'},
  'Possible Duplicate':{sev:'med',icon:'🔁'},
};

function renderQuality(){
  const allIssues=runDQChecks();
  updateDQBadge(allIssues.length);

  // Distinct filter values from ALL issues (always show full dropdown options)
  const allPods=[...new Set(allIssues.map(i=>i.pod).filter(Boolean))].sort();
  const allQtrs=[...new Set(allIssues.map(i=>i.quarter).filter(Boolean))].sort();
  const allTypes=[...new Set(allIssues.map(i=>i.dealType).filter(Boolean))].sort();

  // Apply pod/quarter/type filters first — tile counts reflect these
  let issues=[...allIssues];
  if(dqFilterPod)   issues=issues.filter(i=>i.pod===dqFilterPod);
  if(dqFilterQ)     issues=issues.filter(i=>i.quarter===dqFilterQ);
  if(dqFilterType)  issues=issues.filter(i=>i.dealType===dqFilterType);

  // Compute tile counts from post-filter set (so tiles update when pod/quarter/type filter changes)
  const issueGroups={};
  for(const i of issues){issueGroups[i.issue]=(issueGroups[i.issue]||0)+1;}

  // Apply issue-type filter last (tile clicks)
  if(dqFilterIssue) issues=issues.filter(i=>i.issue===dqFilterIssue);

  // Sort
  const parseDDMMYYYY=ds=>{if(!ds)return 0;const p=ds.split('/');return p.length===3?new Date(+p[2],+p[1]-1,+p[0]).getTime():0;};
  issues.sort((a,b)=>{
    if(dqSort==='amount_desc') return (b.amount||0)-(a.amount||0);
    if(dqSort==='amount_asc')  return (a.amount||0)-(b.amount||0);
    if(dqSort==='close_asc')   return parseDDMMYYYY(a.closeDate)-parseDDMMYYYY(b.closeDate);
    if(dqSort==='close_desc')  return parseDDMMYYYY(b.closeDate)-parseDDMMYYYY(a.closeDate);
    if(dqSort==='company_asc') return (a.company||'').localeCompare(b.company||'');
    if(dqSort==='quarter')     return (a.quarter||'').localeCompare(b.quarter||'')||(a.company||'').localeCompare(b.company||'');
    // default: severity then company
    return (SEV_ORDER[a.sev]||9)-(SEV_ORDER[b.sev]||9)||(a.company||'').localeCompare(b.company||'');
  });

  // Summary cards
  const summaryCards=Object.entries(issueGroups).map(([label,cnt])=>{
    const m=ISSUE_META[label]||{sev:'low',icon:'⚠'};
    const col=m.sev==='high'?'var(--red)':m.sev==='med'?'var(--yellow)':'var(--muted)';
    const isActive=dqFilterIssue===label;
    return`<div class="dq-card${isActive?' active-filter':''}" onclick="dqFilterIssue=dqFilterIssue==='${label}'?'':'${label}';renderQuality()">
      <div class="dqc-n" style="color:${col}">${cnt}</div>
      <div class="dqc-l">${m.icon} ${label}</div>
    </div>`;
  }).join('');

  // HubSpot portal ID helper
  const hsPortal=HS_PORTAL_ID;

function isPastCloseDate(ds){
  if(!ds||ds==='')return false;
  const p=ds.split('/');if(p.length!==3)return false;
  const d=new Date(+p[2],+p[1]-1,+p[0]);
  const t=new Date();t.setHours(0,0,0,0);
  return !isNaN(d.getTime())&&d.getFullYear()>=2000&&d<t;
}

function clearLog(){
  const pin=prompt('Enter admin PIN to clear the log:');
  if(pin===null)return;
  if(pin!=='SD2027'){alert('Incorrect PIN.');return;}
  if(!confirm('Clear all change log entries? This cannot be undone.'))return;
  try{localStorage.removeItem(LOG_KEY);}catch(_){}
  clearUnread();
  renderLog();
}

// ── FC tag style helper ───────────────────────────────────────────────────────
function fcClass(fc){
  const f=(fc||'').toLowerCase();
  if(f==='renewed'||f==='closed won')return'rn';
  if(f==='commit')return'cm';
  if(f.includes('touch'))return'tg';
  if(f==='churned'||f==='closed lost')return'ch';
  if(f==='best case'||f==='best_case')return'bc';
  if(f==='downgrade')return'dn';
  return'pp';
}

// ── Log renderer ──────────────────────────────────────────────────────────────
function renderLog(){
  let entries=loadLog();

  // Collect distinct values for filters
  const pods=[...new Set(entries.map(e=>e.podLead).filter(Boolean))].sort();
  const quarters=[...new Set(entries.map(e=>e.fiscalQuarter).filter(Boolean))].sort();
  const cats=[...new Set([...entries.map(e=>e.oldFC),...entries.map(e=>e.newFC)].filter(Boolean))].sort();

  // Apply filters
  if(logFilterPod) entries=entries.filter(e=>e.podLead===logFilterPod);
  if(logFilterQ)   entries=entries.filter(e=>e.fiscalQuarter===logFilterQ);
  if(logFilterCat) entries=entries.filter(e=>e.oldFC===logFilterCat||e.newFC===logFilterCat);
  if(logFilterType)entries=entries.filter(e=>e.dealType===logFilterType);

  const opt=(v,sel,label)=>`<option value="${v}"${sel===v?' selected':''}>${label}</option>`;
  const podOpts=pods.map(p=>opt(p,logFilterPod,p)).join('');
  const qOpts=quarters.map(q=>opt(q,logFilterQ,q)).join('');
  const catOpts=cats.map(c=>opt(c,logFilterCat,c)).join('');

  const filters=`
    <div class="log-filters">
      <span class="flab">Filter:</span>
      <select onchange="logFilterPod=this.value;renderLog()">
        <option value="">All Pods</option>${podOpts}
      </select>
      <select onchange="logFilterQ=this.value;renderLog()">
        <option value="">All Quarters</option>${qOpts}
      </select>
      <select onchange="logFilterCat=this.value;renderLog()">
        <option value="">Any Category</option>${catOpts}
      </select>
      <select onchange="logFilterType=this.value;renderLog()">
        <option value="">All Types</option>
        <option value="Renewal"${logFilterType==='Renewal'?' selected':''}>Renewal</option>
        <option value="Upsell"${logFilterType==='Upsell'?' selected':''}>Upsell</option>
      </select>
      <div class="log-actions">
        <button class="log-clear" onclick="clearLog()">Clear Log</button>
      </div>
    </div>`;

  let body='';
  if(entries.length===0){
    body=`<div class="log-empty">
      <div class="le-icon">📋</div>
      <p>No changes recorded yet.<br>Changes are detected each time you <b>Refresh</b> data<br>and a deal's forecast category has shifted.</p>
    </div>`;
  } else {
    const rows=entries.map(e=>{
      const d=new Date(e.detectedAt);
      const when=d.toLocaleString('en-IN',{day:'numeric',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'});
      const color=POD_COLORS[e.podLead]||'#6c63ff';
      const podBadge=`<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>${e.podLead||'—'}</div>`;
      const typePill=e.dealType==='Renewal'
        ?`<span class="tag cm">Renewal</span>`
        :`<span class="tag cw">Upsell</span>`;
      const fcChange=`<div class="arrow-chip">
        <span class="old">${e.oldFC||'—'}</span>
        <span class="arr">→</span>
        <span class="new tag ${fcClass(e.newFC)}">${e.newFC||'—'}</span>
      </div>`;
      return`<tr>
        <td style="color:var(--muted);font-size:11px;white-space:nowrap">${when}</td>
        <td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.company}">${e.company}</td>
        <td>${podBadge}</td>
        <td style="font-size:11px;color:var(--muted)">${e.fiscalQuarter}</td>
        <td>${typePill}</td>
        <td>${fmt(e.amount)}</td>
        <td>${fcChange}</td>
      </tr>`;
    }).join('');
    body=`
      <div class="log-count">${entries.length} change${entries.length!==1?'s':''} shown</div>
      <div class="mwrap" style="overflow-x:auto">
        <table>
          <thead><tr>
            <th style="text-align:left">Detected At</th>
            <th style="text-align:left">Company</th>
            <th style="text-align:left">Pod</th>
            <th style="text-align:left">Quarter</th>
            <th style="text-align:left">Type</th>

            <th style="text-align:left">FC Change</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  document.getElementById('app').innerHTML=`
    <div class="log-page">
      <div class="ttl" style="margin-bottom:16px">FC Change Log — tracks forecast category shifts on each Refresh</div>
      ${filters}
      ${body}
    </div>`;
}

// Returns ['May-26','Jun-26','Jul-26'] for 'Q1-FY2027' (FY runs May–Apr: Q1=May/Jun/Jul, Q2=Aug/Sep/Oct, Q3=Nov/Dec/Jan, Q4=Feb/Mar/Apr)
function getQuarterMonths(q){
  const m=/Q(\d)-FY(\d{4})/.exec(q||''); if(!m) return [];
  const qn=+m[1], fy=+m[2];
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const map={1:[[4,fy-1],[5,fy-1],[6,fy-1]],2:[[7,fy-1],[8,fy-1],[9,fy-1]],3:[[10,fy-1],[11,fy-1],[0,fy]],4:[[1,fy],[2,fy],[3,fy]]};
  return (map[qn]||[]).map(([mi,yr])=>mo[mi]+'-'+String(yr).slice(2));
}
function ovrSetType(t){ovrFilterType=ovrFilterType===t?'':t;renderOverrides();}
function ovrClearFilters(){ovrFilterType='';ovrFilterOvrOnly=false;renderOverrides();}

function ovrToggleEdit(){

function ovrMarkClear(dealId){

}

async function ovrSaveAll(){
  const url=localStorage.getItem(URL_KEY);
  if(!url){alert('No API URL configured');return;}
  const saveBtn=document.getElementById('ovrSaveBtn');
  if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='Saving...';}
  const nowStr=new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const posts=[];
  for(const dealId of Object.keys(ovrDirty)){
    const d=ovrDealMap[dealId]; if(!d) continue;
    const amtRaw=d._type==='Upsell'?(d.effectiveARR||d.annualisedARR||d.amount||0):(d.amount||0);
    let body;
    if(ovrDirty[dealId]==='clear'){
      body={dealId,dealType:d._type,action:'clear',overrideBy:overrideAuth.podLead,company:d.company||'',
            quarter:d.fiscalQuarter||activeQ,oldFC:d.overrideFC||'',oldAmount:d.overrideAmount!=null?d.overrideAmount:'',oldMonth:d.overrideMonth||''};
      // Update in-memory
      const arr=d._type==='Renewal'?DATA.renewalDeals:DATA.upsellDeals;
      const rec=arr.find(x=>x.dealId===dealId);
      if(rec){rec.overrideFC='';rec.overrideAmount=null;rec.overrideMonth='';rec.overrideBy='';rec.overrideAt='';}
    } else {
      const newFC=document.getElementById('ovrFC_'+dealId)?.value||'';
      const newAmt=document.getElementById('ovrAmt_'+dealId)?.value||'';
      const newMo=document.getElementById('ovrMo_'+dealId)?.value||'';
      body={dealId,dealType:d._type,overrideFC:newFC,overrideAmount:newAmt?parseFloat(newAmt):'',overrideMonth:newMo,
            overrideBy:overrideAuth.podLead,company:d.company||'',quarter:d.fiscalQuarter||activeQ,
            oldFC:d.forecastCategory||'',oldAmount:amtRaw,oldMonth:d.closeMonth||''};
      // Update in-memory
      const arr=d._type==='Renewal'?DATA.renewalDeals:DATA.upsellDeals;
      const rec=arr.find(x=>x.dealId===dealId);
      if(rec){rec.overrideFC=newFC;rec.overrideAmount=newAmt?parseFloat(newAmt):null;
              rec.overrideMonth=newMo;rec.overrideBy=overrideAuth.podLead;rec.overrideAt=nowStr;}
    }
    // JSONP script-tag injection — same mechanism as data fetch, sends cookies,
    // works with Google Workspace auth. fetch(no-cors) drops cookies and silently fails.
    posts.push(new Promise(resolve=>{
      const cbName='csfc_write_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      const script=document.createElement('script');
      window[cbName]=()=>{ try{delete window[cbName];script.parentNode&&script.parentNode.removeChild(script);}catch(e){} resolve(); };
      script.onerror=()=>{ try{delete window[cbName];script.parentNode&&script.parentNode.removeChild(script);}catch(e){} resolve(); };
      script.src=url+(url.includes('?')?'&':'?')+new URLSearchParams({action:'writeOverride',payload:JSON.stringify(body),callback:cbName}).toString();
      document.head.appendChild(script);
      setTimeout(()=>{ try{delete window[cbName];script.parentNode&&script.parentNode.removeChild(script);}catch(e){} resolve(); },10000);
    }));
  }
  await Promise.all(posts);
  ovrDirty={}; ovrEditMode=false;
  render();          // update dashboard tiles
  renderOverrides(); // re-render table
}

    // Update in-memory

    const rec=arr.find(x=>x.dealId===dealId);
    if(rec){rec.overrideFC='';rec.overrideAmount=null;rec.overrideMonth='';rec.overrideBy='';rec.overrideAt='';}
    posts.push(new Promise(resolve=>{
      const cbName='csfc_write_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      const script=document.createElement('script');
      window[cbName]=()=>{ try{delete window[cbName];script.parentNode&&script.parentNode.removeChild(script);}catch(e){} resolve(); };
      script.onerror=()=>{ try{delete window[cbName];script.parentNode&&script.parentNode.removeChild(script);}catch(e){} resolve(); };
      script.src=url+(url.includes('?')?'&':'?')+new URLSearchParams({action:'writeOverride',payload:JSON.stringify(body),callback:cbName}).toString();
      document.head.appendChild(script);
      setTimeout(()=>{ try{delete window[cbName];script.parentNode&&script.parentNode.removeChild(script);}catch(e){} resolve(); },10000);
    }));
  }
  await Promise.all(posts);
  render();
  renderOverrides();
}

// ── Overrides page renderer ───────────────────────────────────────────────────
function renderOverrides(){
  const main=document.getElementById('app');
  ovrDealMap={}; // reset deal map each render

  // Auth bar
  const authHtml=overrideAuth
    ?`<div style="display:flex;align-items:center;gap:12px;background:rgba(108,99,255,.08);border:1px solid var(--accent);border-radius:8px;padding:10px 16px;margin-bottom:16px">
        <span style="font-size:13px;color:var(--accent)">🔐 Signed in as <strong>${overrideAuth.podLead}</strong> (Pod Lead)</span>
        <button onclick="overrideSignOut()" style="margin-left:auto;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px">Sign Out</button>
      </div>`
    :`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px">
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <select id="ovrPodLead" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:6px;font-size:13px">
            <option value="">POD Lead</option>
            ${POD_LEADS_LIST.map(n=>`<option value="${n}">${n}</option>`).join('')}
          </select>
          <input id="ovrPin" type="password" placeholder="Enter PIN" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:6px;font-size:13px;width:140px" onkeydown="if(event.key==='Enter')ovrSignIn()"/>
          <button onclick="ovrSignIn()" style="background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">Sign In</button>
          <span id="ovrPinErr" style="color:#ef4444;font-size:12px;display:none"></span>
        </div>
      </div>`;

  // Gather active deals
  const q=activeQ;
  const allDeals=[];
  (DATA.renewalDeals||[]).filter(d=>d.fiscalQuarter===q).forEach(d=>{
    const stL=(d.dealStage||'').toLowerCase();
    if(stL==='renewed'||stL==='churned') return;
    allDeals.push({...d,_type:'Renewal'});
  });
  (DATA.upsellDeals||[]).filter(d=>d.fiscalQuarter===q).forEach(d=>{
    const stL=(d.dealStage||'').toLowerCase();
    if(stL==='closed won'||stL==='closed lost') return;
    const otf=(d.oneTimeFeeRaw||'').toLowerCase();
    if(otf==='yes'||otf==='true'||otf==='1'||d.oneTimeFee===true) return;
    allDeals.push({...d,_type:'Upsell'});
  });

  // Sort: CSM (dealOwner) → Company → FC
  allDeals.sort((a,b)=>{
    const oa=(a.dealOwner||'').toLowerCase(),ob=(b.dealOwner||'').toLowerCase();
    if(oa<ob)return -1;if(oa>ob)return 1;
    const ca=(a.company||'').toLowerCase(),cb=(b.company||'').toLowerCase();
    if(ca<cb)return -1;if(ca>cb)return 1;
    const fa=(a.forecastCategory||'').toLowerCase(),fb=(b.forecastCategory||'').toLowerCase();
    return fa<fb?-1:fa>fb?1:0;
  });

  // When authed: always filter to their pod only; others see all
  let filtDeals=overrideAuth ? allDeals.filter(d=>d.podLead===overrideAuth.podLead) : allDeals;

  // Populate deal map for save lookups
  filtDeals.forEach(d=>{ ovrDealMap[d.dealId]=d; });

  // FC options
  const renewalFCOpts=['Commit','Touch n Go','Downgrade','Churn','Best Case'];
  const upsellFCOpts=['Commit','Touch n Go','Best Case'];

  // Filter bar

  // Table rows
  const rows=filtDeals.map(d=>{
    const hasOvr=!!(d.overrideFC||(d.overrideAmount!==null&&d.overrideAmount!==undefined&&d.overrideAmount!=='')||d.overrideMonth);
    const amtRaw=d._type==='Upsell'?(d.effectiveARR||d.annualisedARR||d.amount||0):(d.amount||0);
    const fcOpts=d._type==='Renewal'?renewalFCOpts:upsellFCOpts;
    // Default values: override if set, otherwise current baseline
    const defaultFC=d.overrideFC||d.forecastCategory||'';
    const defaultAmt=(d.overrideAmount!==null&&d.overrideAmount!==undefined&&d.overrideAmount!=='')?d.overrideAmount:amtRaw;
    const defaultMo=d.overrideMonth||d.closeMonth||'';

    const fcCell=ovrEditMode
      ?`<select id="ovrFC_${d.dealId}" onchange="ovrMarkDirty('${d.dealId}')" style="background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:4px 6px;border-radius:5px;font-size:12px;width:100%">
          ${fcOpts.map(o=>`<option value="${o}"${defaultFC===o?' selected':''}>${o}</option>`).join('')}
        </select>`
      :(hasOvr&&d.overrideFC
        ?`<span style="text-decoration:line-through;color:var(--muted);font-size:11px">${d.forecastCategory||'—'}</span> <span style="color:var(--accent);font-weight:600">${d.overrideFC}</span>`

    const amtCell=ovrEditMode
      ?`<input id="ovrAmt_${d.dealId}" type="text" inputmode="decimal" value="${defaultAmt}" onchange="ovrMarkDirty('${d.dealId}')" style="background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:4px 6px;border-radius:5px;font-size:12px;width:90px;text-align:right"/>`
      :((hasOvr&&d.overrideAmount!==null&&d.overrideAmount!==undefined&&d.overrideAmount!=='')
        ?`<span style="text-decoration:line-through;color:var(--muted);font-size:11px">${fmt(amtRaw)}</span> <span style="color:var(--accent);font-weight:600">${fmt(parseFloat(d.overrideAmount)||0)}</span>`
        :fmt(amtRaw));

    const qMonths=getQuarterMonths(activeQ);
    const moCell=ovrEditMode
      ?`<select id="ovrMo_${d.dealId}" onchange="ovrMarkDirty('${d.dealId}')" style="background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:4px 6px;border-radius:5px;font-size:12px">${qMonths.map(mo=>`<option value="${mo}"${defaultMo===mo?' selected':''}>${mo}</option>`).join('')}</select>`
      :((hasOvr&&d.overrideMonth)

        :(d.closeMonth||'—'));

    const clearCell=ovrEditMode&&hasOvr
      ?`<button id="ovrClearBtn_${d.dealId}" onclick="ovrMarkClear('${d.dealId}')" style="background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;text-decoration:underline;white-space:nowrap">Clear override</button>`
      :'';

    return `<tr id="ovrRow_${d.dealId}" class="${hasOvr?'ovr-active':''}">
      <td><span class="tag ${d._type==='Renewal'?'r':'u'}" style="font-size:10px">${d._type[0]}</span>${hasOvr?` <span class="tag cm" style="font-size:9px">OVR</span>`:''}</td>
      <td style="font-weight:500">${d.company||'—'}</td>
      <td style="color:var(--muted);font-size:12px">${d.dealOwner||'—'}</td>
      <td style="font-size:12px;color:var(--muted)">${d.dealStage||'—'}</td>
      <td style="font-size:11px;color:var(--muted)">${d.upsellType||'—'}</td>
      <td>${moCell}</td>
      <td>${fcCell}</td>
      <td>${amtCell}</td>
      <td style="color:var(--muted);font-size:12px">${d.overrideBy||'—'}</td>
      <td style="color:var(--muted);font-size:11px">${d.overrideAt||'—'}</td>
      ${ovrEditMode?`<td style="white-space:nowrap">${clearCell}</td>`:''}

  const colCount=ovrEditMode?11:10;
  const tableHtml=`<div style="overflow-x:auto;border-radius:12px;border:1px solid var(--border)">
    <table class="tbl" style="width:100%;min-width:900px;table-layout:fixed">

        <th style="width:180px">Company</th>

        <th style="width:90px${ovrEditMode?';color:var(--accent)':''}">Amount</th>

  main.innerHTML=`<div class="log-page">
