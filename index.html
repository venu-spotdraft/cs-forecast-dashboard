}

// ── CSM Aggregation ───────────────────────────────────────────────────────────
function computeCSMAgg(q){
  const agg={};
  function get(csm){
    if(!agg[csm]) agg[csm]={pods:new Set(),renewable:0,renewed:0,churned:0,commit:0,tng:0,churnForecast:0,downgraded:0,upsellCW:0,upsellCommit:0,upsellTNG:0,upsellBC:0,csql:0,renewalCount:0,upsellCount:0,upsellCommitCount:0,upsellTNGCount:0,upsellBCCount:0};
    return agg[csm];
  }
  // Renewals
  for(const d of (DATA.renewalDeals||[])){
    if(d.fiscalQuarter!==q) continue;
    const csm=d.dealOwner||'(Unassigned)';
    const b=get(csm);
    if(d.podLead) b.pods.add(d.podLead);
    const stL=(d.dealStage||'').toLowerCase();
    const fc=effFC(d).toLowerCase();
    const baseAmt=d.amount||0;
    const amt=effAmount(d,false);
    b.renewalCount++;
    b.renewable+=baseAmt; // renewable always uses original amount regardless of override
    if(stL==='renewed') b.renewed+=(d.renewedARR||d.amount||0);
    if(stL==='churned') b.churned+=baseAmt;
    // active renewal: not renewed, not churned
    if(stL!=='renewed'&&stL!=='churned'){
      if(fc==='commit') b.commit+=amt;
      if(fc.includes('touch')) b.tng+=amt;
      if(fc==='churn') b.churnForecast+=amt;
      if(fc==='downgrade') b.downgraded+=(d.overrideAmount!==null&&d.overrideAmount!==undefined&&d.overrideAmount!==''&&overrideMode?parseFloat(d.overrideAmount)||0:(d.downgradedARR||0));
    }
  }
  // Upsells
  for(const d of (DATA.upsellDeals||[])){
    if(d.fiscalQuarter!==q) continue;
    const csm=d.dealOwner||'(Unassigned)';
    const b=get(csm);
    if(d.podLead) b.pods.add(d.podLead);
    const stL=(d.dealStage||'').toLowerCase();
    const fc=effFC(d).toLowerCase();
    if(stL!=='closed lost') b.upsellCount++;
    const eArr=effAmount(d,true);
    const otf=!!d.oneTimeFee;
    if(stL==='closed won'&&!otf) b.upsellCW+=eArr;
    // csql: count recurring (non-1x) upsell deals where amQualified==='yes' (excl. closed lost)
    if((d.amQualified||'').toLowerCase()==='yes'&&!otf&&stL!=='closed lost') b.csql++;
    // active upsell: not closed won, not closed lost
    if(stL!=='closed won'&&stL!=='closed lost'&&!otf){
      if(fc==='commit'){b.upsellCommit+=eArr;b.upsellCommitCount++;}
      if(fc.includes('touch')){b.upsellTNG+=eArr;b.upsellTNGCount++;}
      if(fc.includes('best')){b.upsellBC+=eArr;b.upsellBCCount++;}
    }
  }
  return agg;
}

// ── CSM View renderer ─────────────────────────────────────────────────────────
function renderCSMView(qtabsHTML,sumbarHTML,scenPanelHTML){
  const agg=computeCSMAgg(activeQ);
  // Collect distinct pods for filter dropdown
  const allPods=[...new Set(Object.values(agg).flatMap(b=>[...b.pods]))].sort();
  const allCSMs=Object.keys(agg).sort((a,b)=>a.localeCompare(b));

  // Apply filters
  let filtered=allCSMs;
  if(csmFilterCSM) filtered=filtered.filter(c=>c===csmFilterCSM);
  if(csmFilterPod)  filtered=filtered.filter(c=>agg[c].pods.has(csmFilterPod));

  const opt=(v,sel,lbl)=>`<option value="${v}"${sel===v?' selected':''}>${lbl}</option>`;
  const filterBar=`<div style="display:flex;align-items:center;gap:8px">
    <select style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 10px;border-radius:8px;outline:none;cursor:pointer" onchange="csmFilterCSM=this.value;render()">
      <option value="">All CSMs</option>${allCSMs.map(c=>opt(c,csmFilterCSM,c)).join('')}
    </select>
    <select style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 10px;border-radius:8px;outline:none;cursor:pointer" onchange="csmFilterPod=this.value;render()">
      <option value="">All PODs</option>${allPods.map(p=>opt(p,csmFilterPod,p)).join('')}
    </select>
    ${(csmFilterCSM||csmFilterPod)?`<button class="icon-btn" onclick="csmFilterCSM='';csmFilterPod='';render()" style="font-size:11px;padding:4px 10px">✕</button>`:''}
  </div>`;

  const CSM_PALETTE=['#6c63ff','#00d4aa','#f97316','#3b82f6','#a855f7','#ec4899','#14b8a6','#f59e0b','#84cc16','#06b6d4'];
  function csmCol(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))%CSM_PALETTE.length;return CSM_PALETTE[Math.abs(h)];}
  const rows=filtered.map(csm=>{
    const b=agg[csm];
    const grrVal=b.renewable>0?b.renewed/b.renewable:null;
    const bcGRR=b.renewable>0?(b.renewed+b.commit+0.75*b.tng+b.downgraded)/b.renewable:null;
    const wcGRR=b.renewable>0?(b.renewed+b.commit+b.downgraded)/b.renewable:null;
    const grrCls=grrVal===null?'na':grrVal>=0.87?'green':grrVal>=0.85?'yellow':'red';
    const bcCls=bcGRR===null?'na':bcGRR>=0.87?'green':bcGRR>=0.85?'yellow':'red';
    const wcCls=wcGRR===null?'na':wcGRR>=0.87?'green':wcGRR>=0.85?'yellow':'red';
    const grrDisp=grrVal===null?'—':pct(grrVal);
    const ocFull=`openCSMModal('${csm.replace(/'/g,"\\'")}','r',null,null,null)`;
    const tdA=(tab,ft,fv,lbl,val)=>`<td onclick="openCSMModal('${csm.replace(/'/g,"\\'")}','${tab}','${ft}','${fv}','${lbl}')" style="cursor:pointer"><span class="av">${fmt(val)}</span></td>`;
    const initials=csm.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()||csm.slice(0,2).toUpperCase();
    const avatarColor=[...b.pods][0]?(POD_COLORS[[...b.pods][0]]||csmCol(csm)):csmCol(csm);
    return`<tr>
      <td onclick="${ocFull}" style="cursor:pointer"><div class="pn"><div class="pa" style="background:${avatarColor}">${initials}</div><div><div class="av">${csm}</div><div class="pm">${b.renewalCount}R · ${b.upsellCount}U</div></div></div></td>
      <td onclick="${ocFull}" style="cursor:pointer"><span class="chip ${grrCls}">${grrDisp}</span></td>
      <td><span class="chip ${bcCls}">${bcGRR!==null?pct(bcGRR):'—'}</span></td>
      <td><span class="chip ${wcCls}">${wcGRR!==null?pct(wcGRR):'—'}</span></td>
      ${tdA('r','','','All Renewals',b.renewable)}
      ${tdA('r','stage','Renewed','Renewed',b.renewed)}
      ${tdA('r','fc','downgrade','Downgrade',b.downgraded)}
      ${tdA('r','stage','Churned','Churned',b.churned)}
      ${tdA('u','stage','closed won','Upsell Closed Won',b.upsellCW)}
    </tr>`;
  }).join('');

  // Totals row
  let tot={renewable:0,renewed:0,churned:0,commit:0,tng:0,downgraded:0,churnForecast:0,upsellCW:0,upsellCommit:0,upsellTNG:0,upsellBC:0,csql:0};
  filtered.forEach(csm=>{const b=agg[csm];Object.keys(tot).forEach(k=>tot[k]+=(b[k]||0));});
  const totGRR=tot.renewable>0?tot.renewed/tot.renewable:null;
  const totBCGRR=tot.renewable>0?(tot.renewed+tot.commit+0.75*tot.tng+tot.downgraded)/tot.renewable:null;
  const totWCGRR=tot.renewable>0?(tot.renewed+tot.commit+tot.downgraded)/tot.renewable:null;
  const totGRRCls=totGRR===null?'na':totGRR>=0.9?'green':totGRR>=0.8?'yellow':'red';
  const totBCCls=totBCGRR===null?'na':totBCGRR>=0.87?'green':totBCGRR>=0.85?'yellow':'red';
  const totWCCls=totWCGRR===null?'na':totWCGRR>=0.87?'green':totWCGRR>=0.85?'yellow':'red';
  const totRow=`<tr class="trow"><td>ALL CSMs</td>
    <td><span class="chip ${totGRRCls}">${totGRR!==null?pct(totGRR):'—'}</span></td>
    <td><span class="chip ${totBCCls}">${totBCGRR!==null?pct(totBCGRR):'—'}</span></td>
    <td><span class="chip ${totWCCls}">${totWCGRR!==null?pct(totWCGRR):'—'}</span></td>
    <td>${fmt(tot.renewable)}</td><td>${fmt(tot.renewed)}</td>
    <td>${fmt(tot.downgraded)}</td><td>${fmt(tot.churned)}</td>
    <td>${fmt(tot.upsellCW)}</td>
  </tr>`;

  // CSM view always uses its own 4-tile sumbar (updates with filter)
  const csmSumSource=(csmFilterCSM||csmFilterPod)?filtered:allCSMs;
  const flt={renewable:0,renewed:0,churned:0,commit:0,tng:0,churnForecast:0,downgraded:0,upsellCW:0,upsellCommit:0,upsellTNG:0,upsellBC:0,csql:0,renewalCount:0,upsellCount:0,upsellCommitCount:0,upsellTNGCount:0,upsellBCCount:0};
  csmSumSource.forEach(c=>{const b=agg[c];Object.keys(flt).forEach(k=>flt[k]+=(b[k]||0));});
  const fBCGRR=flt.renewable>0?(flt.renewed+flt.commit+0.75*flt.tng+flt.downgraded)/flt.renewable:null;
  const fWCGRR=flt.renewable>0?(flt.renewed+flt.commit+flt.downgraded)/flt.renewable:null;
  const grrBCCls=fBCGRR===null?'var(--accent)':fBCGRR>=0.87?'var(--green)':fBCGRR>=0.85?'var(--yellow)':'var(--red)';
  const hasActivePipeline=flt.renewable>(flt.renewed+flt.churned);
  // WC first, BC second (low → high)
  const grrHasRange=fBCGRR!==null&&fWCGRR!==null&&Math.abs(fBCGRR-fWCGRR)>0.001;
  const grrRange=fBCGRR!==null?(grrHasRange?pct(fWCGRR)+' – '+pct(fBCGRR):pct(fBCGRR)):'—';
  const activeSumbarHTML=`
    <div class="sc hi">
      <div class="l">Book of Business</div>
      <div class="v">${fmt(flt.renewable)||'—'}</div>
      <div class="s">Renewed: ${fmt(flt.renewed)||'—'} &nbsp;·&nbsp; Churned: ${fmt(flt.churned)||'—'}</div>
    </div>
    <div class="sc hi">
      <div class="l">GRR (WC – BC)</div>
      <div class="v" style="color:${grrBCCls};font-size:${grrHasRange?'18px':'22px'}">${grrRange}</div>
      <div class="s">${hasActivePipeline?`Commit: ${fmt(flt.commit)||'—'} &nbsp;·&nbsp; TNG: ${fmt(flt.tng)||'—'} &nbsp;·&nbsp; Downgrade: ${fmt(flt.downgraded)||'—'} &nbsp;·&nbsp; Churn: ${fmt(flt.churnForecast)||'—'}`:''}</div>
    </div>
    <div class="sc hi">
      <div class="l">CSQL</div>
      <div class="v">${flt.csql}</div>
      <div class="s">Total ${flt.upsellCount} &nbsp;·&nbsp; Commit: ${flt.upsellCommitCount} &nbsp;·&nbsp; TNG: ${flt.upsellTNGCount} &nbsp;·&nbsp; BC: ${flt.upsellBCCount} &nbsp;·&nbsp; Pipeline: ${flt.upsellCommitCount+flt.upsellTNGCount+flt.upsellBCCount}</div>
    </div>
    <div class="sc hi">
      <div class="l">Upsell Closed Won</div>
      <div class="v" style="color:var(--accent2)">${fmt(flt.upsellCW)||'—'}</div>
      <div class="s">Commit: ${fmt(flt.upsellCommit)||'—'} &nbsp;·&nbsp; TNG: ${fmt(flt.upsellTNG)||'—'} &nbsp;·&nbsp; BC: ${fmt(flt.upsellBC)||'—'}</div>
    </div>`;

  const toggleBtns='';

  document.getElementById('app').innerHTML=`
    <div class="qtabs"><div style="display:flex;gap:6px">${qtabsHTML}</div>
    ${filterBar}</div>
    <div class="tsec" style="padding-top:10px">
      ${scenPanelHTML}
      <div class="ttl" style="margin-bottom:10px">CSM View — ${activeQ}</div>
      <div class="mwrap" style="overflow-x:auto"><table>
        <thead><tr>
          <th style="text-align:left;min-width:160px">CSM</th>
          <th>GRR</th>
          <th>BC GRR</th>
          <th>WC GRR</th>
          <th>Renewable</th>
          <th>Renewed</th>
          <th>Downgrade</th>
          <!-- Commit and TNG removed -->
          <th>Churned</th>
          <th>Upsell CW</th>
        </tr></thead>
        <tbody>${rows}${totRow}</tbody>
      </table></div>
    </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const{aggregates,meta}=DATA;
  const quarters=meta.quarters||[];
  if(!quarters.includes(activeQ)) activeQ=quarters[0];
  if(meta.lastUpdated){
    const d=new Date(meta.lastUpdated);
    const el=document.getElementById('lastUpdated');
    if(el) el.textContent='Last updated: '+d.toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const ft=document.getElementById('pageFooter');
    if(ft) ft.style.display='block';
  }
  const qData=aggregates[activeQ]||{};
  const podLeads=meta.podLeads||Object.keys(qData);
  const tabsHTML=quarters.map(q=>`<div class="qtab${q===activeQ?' active':''}" onclick="switchQ('${q}')">${q}</div>`).join('');
  let tRA=0,tRn=0,tCm=0,tTG=0,tDg=0,tUCW=0,tUCm=0,tUTG=0,tUBC=0,tDeals=0;
  for(const pod of podLeads){const b=qData[pod];if(!b)continue;tRA+=b.renewableARR||0;tRn+=b.renewedARR||0;tCm+=b.renewalCommit||0;tTG+=b.renewalTNG||0;tDg+=b.downgradedARR||0;tUCW+=b.upsellClosedWon||0;tUCm+=b.upsellCommit||0;tUTG+=b.upsellTNG||0;tUBC+=b.upsellBestCase||0;tDeals+=(b.renewalDealCount||0)+(b.upsellDealCount||0);}
  // Override mode: delta approach — only adjust amounts that actually have overrides.
  // This guarantees baseline=override when no overrides exist.
  const podDeltas={}; // pod → {dCm,dTG,dDg,dUCm,dUTG,dUBC}
  if(overrideMode){
    for(const d of (DATA.renewalDeals||[])){
      if(d.fiscalQuarter!==activeQ||!podLeads.includes(d.podLead)) continue;
      const hasOvr=d.overrideFC||(d.overrideAmount!==null&&d.overrideAmount!==undefined&&d.overrideAmount!=='');
      if(!hasOvr) continue;
      const stL=(d.dealStage||'').toLowerCase();
      if(stL==='renewed'||stL==='churned') continue;
      const pod=d.podLead;
      if(!podDeltas[pod]) podDeltas[pod]={dCm:0,dTG:0,dDg:0,dUCm:0,dUTG:0,dUBC:0};
      const pd=podDeltas[pod];
      const baseFC=(d.forecastCategory||'').toLowerCase();
      const baseAmt=d.amount||0;
      const hasOvrAmt=d.overrideAmount!==null&&d.overrideAmount!==undefined&&d.overrideAmount!=='';
      const ovrFC=d.overrideFC?d.overrideFC.toLowerCase():baseFC;
      const ovrAmt=hasOvrAmt?parseFloat(d.overrideAmount)||0:baseAmt;
      if(baseFC==='commit') pd.dCm-=baseAmt;
      else if(baseFC.includes('touch')) pd.dTG-=baseAmt;
      else if(baseFC==='downgrade') pd.dDg-=(d.downgradedARR||0);
      if(ovrFC==='commit') pd.dCm+=ovrAmt;
      else if(ovrFC.includes('touch')) pd.dTG+=ovrAmt;
      else if(ovrFC==='downgrade') pd.dDg+=hasOvrAmt?ovrAmt:(d.downgradedARR||0);
    }
    for(const d of (DATA.upsellDeals||[])){
      if(d.fiscalQuarter!==activeQ||!podLeads.includes(d.podLead)) continue;
      const hasOvr=d.overrideFC||(d.overrideAmount!==null&&d.overrideAmount!==undefined&&d.overrideAmount!=='');
      if(!hasOvr) continue;
      const stL=(d.dealStage||'').toLowerCase();
      if(stL==='closed won'||stL==='closed lost') continue;
      const pod=d.podLead;
      if(!podDeltas[pod]) podDeltas[pod]={dCm:0,dTG:0,dDg:0,dUCm:0,dUTG:0,dUBC:0};
      const pd=podDeltas[pod];
      const baseFC=(d.forecastCategory||'').toLowerCase();
      const baseEArr=d.effectiveARR||d.annualisedARR||d.amount||0;
      const hasOvrAmt=d.overrideAmount!==null&&d.overrideAmount!==undefined&&d.overrideAmount!=='';
      const ovrFC=d.overrideFC?d.overrideFC.toLowerCase():baseFC;
      const ovrAmt=hasOvrAmt?parseFloat(d.overrideAmount)||0:baseEArr;
      if(baseFC==='commit') pd.dUCm-=baseEArr;
      else if(baseFC.includes('touch')) pd.dUTG-=baseEArr;
      else if(baseFC.includes('best')) pd.dUBC-=baseEArr;
      if(ovrFC==='commit') pd.dUCm+=ovrAmt;
      else if(ovrFC.includes('touch')) pd.dUTG+=ovrAmt;
      else if(ovrFC.includes('best')) pd.dUBC+=ovrAmt;
    }
    // Apply pod deltas to totals
    for(const pd of Object.values(podDeltas)){
      tCm+=pd.dCm; tTG+=pd.dTG; tDg+=pd.dDg;
      tUCm+=pd.dUCm; tUTG+=pd.dUTG; tUBC+=pd.dUBC;
    }
  }
  // Churned ARR — computed from deal list for the active quarter
  const churnedDeals=(DATA.renewalDeals||[]).filter(d=>d.fiscalQuarter===activeQ&&podLeads.includes(d.podLead)&&d.dealStage==='Churned');
  const tCh=churnedDeals.reduce((s,d)=>s+(d.amount||0),0);
  const renewedDeals=(DATA.renewalDeals||[]).filter(d=>d.fiscalQuarter===activeQ&&podLeads.includes(d.podLead)&&(d.dealStage||'').toLowerCase()==='renewed');
  const upsellCWDeals=(DATA.upsellDeals||[]).filter(d=>d.fiscalQuarter===activeQ&&podLeads.includes(d.podLead)&&(d.dealStage||'').toLowerCase()==='closed won');
  const bcgV=tRA>0?(tRn+tCm+0.75*tTG+tDg)/tRA:null;
  const wcgV=tRA>0?(tRn+tCm+tDg)/tRA:null;
  const bcnV2=tRA>0?(tRn+tCm+0.75*tTG+tDg+tUCW+tUCm+0.75*tUTG+0.5*tUBC)/tRA:null;
  const wcnV=tRA>0?(tRn+tCm+tDg+tUCW+tUCm)/tRA:null;
  const bcg=bcgV!==null?pct(bcgV):'—';
  const wcg=wcgV!==null?pct(wcgV):'—';
  const bcn=bcnV2!==null?pct(bcnV2):'—';
  const wcn=wcnV!==null?pct(wcnV):'—';
  // Pre-compute scenario totals for the sumbar (SA/tScen computed later — compute inline here)
  const _tBkt={renewableARR:tRA,renewedARR:tRn,renewalCommit:tCm,renewalTNG:tTG,downgradedARR:tDg,
               upsellClosedWon:tUCW,upsellCommit:tUCm,upsellTNG:tUTG,upsellBestCase:tUBC};
  const _sSumbar=isScenActive()?computeScen(_tBkt):null;
  const _sg=_sSumbar?pct(_sSumbar.grr):null;
  const _sn=_sSumbar?pct(_sSumbar.nrr):null;
  const _sgDelta=_sSumbar&&bcgV?(_sSumbar.grr>=bcgV?'▲':'▼')+pct(Math.abs(_sSumbar.grr-bcgV))+' vs BC':null;
  const _snDelta=_sSumbar&&bcnV2?(_sSumbar.nrr>=bcnV2?'▲':'▼')+pct(Math.abs(_sSumbar.nrr-bcnV2))+' vs BC':null;
  // Color coding for summary tiles: GRR AOP=87%, NRR AOP=115%
  const _bcgDisp=_sSumbar?_sSumbar.grr:bcgV;
  const _wcgDisp=wcgV;
  const _bcnDisp=_sSumbar?_sSumbar.nrr:bcnV2;
  const _wcnDisp=wcnV;
  const _grrCol=(v)=>v===null?'var(--muted)':v>=0.87?'var(--green)':v>=0.85?'var(--yellow)':'var(--red)';
  const _nrrCol=(v)=>v===null?'var(--muted)':v>=1.15?'var(--green)':v>=1.05?'var(--yellow)':'var(--red)';
  const sumbar=`
    <div class="sc hi" style="${_sg?'border-color:var(--accent);background:rgba(108,99,255,.07)':''}">
      <div class="l">${_sg?'⚡ Scenario GRR':'Best Case GRR'}</div>
      <div class="v" style="color:${_grrCol(_bcgDisp)}">${_sg||bcg}</div>
    </div>
    <div class="sc hi"><div class="l">Worst Case GRR</div><div class="v" style="color:${_grrCol(_wcgDisp)}">${wcg}</div></div>
    <div class="sc hi" style="${_sn?'background:rgba(0,212,170,.05)':''}">
      <div class="l">${_sn?'⚡ Scenario NRR':'Best Case NRR'}</div>
      <div class="v" style="color:${_nrrCol(_bcnDisp)}">${_sn||bcn}</div>
    </div>
    <div class="sc hi"><div class="l">Worst Case NRR</div><div class="v" style="color:${_nrrCol(_wcnDisp)}">${wcn}</div></div>
    <div class="sc hi"><div class="l">Renewable ARR</div><div class="v" style="color:var(--green)">${fmt(tRA)}</div><div class="s">${tDeals} deals</div></div>
    <div class="sc hi"><div class="l">Renewed ARR</div><div class="v" style="color:var(--green)">${fmt(tRn)}</div><div class="s">${renewedDeals.length} deals</div></div>
    <div class="sc hi"><div class="l">Upsell Closed Won</div><div class="v" style="color:var(--green)">${fmt(tUCW)}</div><div class="s">${upsellCWDeals.length} deals</div></div>
    <div class="sc hi"><div class="l">Churned ARR</div><div class="v" style="color:var(--red)">${fmt(tCh)||'—'}</div><div class="s">${churnedDeals.length} deals</div></div>`;
  // Per-pod churned ARR from deal list
  const podChurned={};
  (DATA.renewalDeals||[]).filter(d=>d.fiscalQuarter===activeQ).forEach(d=>{
    if(d.dealStage==='Churned') podChurned[d.podLead]=(podChurned[d.podLead]||0)+(d.amount||0);
  });

  const tBcgV=(tRn+tCm+0.75*tTG+tDg)/tRA,tWcgV=(tRn+tCm+tDg)/tRA;
  const tBcnV=(tRn+tCm+0.75*tTG+tDg+tUCW+tUCm+0.75*tUTG+0.5*tUBC)/tRA,tWcnV=(tRn+tCm+tDg+tUCW+tUCm)/tRA;
  const tBcnNum=tRn+tCm+0.75*tTG+tDg+tUCW+tUCm+0.75*tUTG+0.5*tUBC;
  const tD105=tRA>0?1.05*tRA-tBcnNum:null;
  const tD115=tRA>0?1.15*tRA-tBcnNum:null;

  // ── Scenario ──
  const SA=isScenActive();
  // Build a fake combined bucket for totals scenario
  const tBucket={renewableARR:tRA,renewedARR:tRn,renewalCommit:tCm,renewalTNG:tTG,downgradedARR:tDg,
                 upsellClosedWon:tUCW,upsellCommit:tUCm,upsellTNG:tUTG,upsellBestCase:tUBC};
  const tScen=computeScen(tBucket);
  // Scenario-adjusted To 105/To 115 for total row
  const tBcnNumEff=SA&&tScen?tScen.nrrNum:tBcnNum;
  const tD105Eff=tRA>0?1.05*tRA-tBcnNumEff:null;
  const tD115Eff=tRA>0?1.15*tRA-tBcnNumEff:null;

  // ── Early return for CSM View (no What-If on CSM) ──
  if(csmView){
    const sBtn=document.getElementById('scenBtn'),sSep=document.getElementById('scenSep');
    if(sBtn) sBtn.style.display='none';
    if(sSep) sSep.style.display='none';
    renderCSMView(tabsHTML,sumbar,'');
    return;
  }
  // Restore scenBtn + separator for non-CSM views
  {const sBtn=document.getElementById('scenBtn'),sSep=document.getElementById('scenSep');if(sBtn)sBtn.style.display='';if(sSep)sSep.style.display='';}

  // Scenario panel HTML
  const scenPanel=scenarioOpen?`
    <div class="scen-panel" style="margin-bottom:16px">
      <div class="scen-hdr">
        <div class="scen-hdr-left">⚡ What-If Scenario${SA?`<span class="scen-active-badge">ACTIVE</span>`:''}
          <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:4px">Toggles override stage weightings for ${activeQ}</span>
        </div>
        <button class="scen-reset" onclick="resetScenario()">Reset All</button>
      </div>
      <div class="scen-body">
        <table class="scen-tbl">
          <thead><tr><th></th><th>Neutral</th><th>All Won</th><th>All Lost</th></tr></thead>
          <tbody>
            <tr class="scen-section-row"><td colspan="4">Renewal</td></tr>
            ${stgHTML('TNG','renewalTNG')}
            ${stgHTML('Commit','renewalCommit')}
            <tr class="scen-section-row"><td colspan="4">Upsell</td></tr>
            ${stgHTML('TNG','upsellTNG')}
            ${stgHTML('Commit','upsellCommit')}
            ${stgHTML('Best Case','upsellBC')}
          </tbody>
        </table>
      </div>
      ${tScen?`<div class="scen-result">
        <div class="sr-item"><div class="sr-label">Scenario GRR (All Pods)</div>
          <div class="sr-val" style="color:var(--accent)">${pct(tScen.grr)}</div>
          <div class="sr-delta" style="color:${tScen.grr>=tBcgV?'var(--green)':'var(--red)'}">
            ${tScen.grr>=tBcgV?'▲':'▼'} ${pct(Math.abs(tScen.grr-tBcgV))} vs BC GRR
          </div>
        </div>
        <div class="sr-sep"></div>
        <div class="sr-item"><div class="sr-label">Scenario NRR (All Pods)</div>
          <div class="sr-val" style="color:var(--accent2)">${pct(tScen.nrr)}</div>
          <div class="sr-delta" style="color:${tScen.nrr>=tBcnV?'var(--green)':'var(--red)'}">
            ${tScen.nrr>=tBcnV?'▲':'▼'} ${pct(Math.abs(tScen.nrr-tBcnV))} vs BC NRR
          </div>
        </div>
        <div class="sr-sep"></div>
        <div class="sr-item"><div class="sr-label">Δ to 105% NRR</div>
          <div class="sr-val" style="font-size:16px;color:${tScen.nrrNum>=1.05*tRA?'var(--green)':'var(--red)'}">${tScen.nrrNum>=1.05*tRA?'+'+fmt(tScen.nrrNum-1.05*tRA)+' ahead':fmt(1.05*tRA-tScen.nrrNum)+' needed'}</div>
        </div>
        <div class="sr-sep"></div>
        <div class="sr-item"><div class="sr-label">Δ to 115% NRR</div>
          <div class="sr-val" style="font-size:16px;color:${tScen.nrrNum>=1.15*tRA?'var(--green)':'var(--red)'}">${tScen.nrrNum>=1.15*tRA?'+'+fmt(tScen.nrrNum-1.15*tRA)+' ahead':fmt(1.15*tRA-tScen.nrrNum)+' needed'}</div>
        </div>
      </div>`:''}
    </div>`:'';

  // Helper: apply per-pod override deltas to a qData bucket for table rendering
  function effPod(pod){
    const base=qData[pod]; if(!base) return null;
    if(!overrideMode||!podDeltas[pod]) return base;
    const pd=podDeltas[pod];
    const ra=base.renewableARR||0, rn=base.renewedARR||0;
    const cm=(base.renewalCommit||0)+pd.dCm, tg=(base.renewalTNG||0)+pd.dTG, dg=(base.downgradedARR||0)+pd.dDg;
    const ucw=base.upsellClosedWon||0, ucm=(base.upsellCommit||0)+pd.dUCm, utg=(base.upsellTNG||0)+pd.dUTG, ubc=(base.upsellBestCase||0)+pd.dUBC;
    return{...base,renewalCommit:cm,renewalTNG:tg,downgradedARR:dg,upsellCommit:ucm,upsellTNG:utg,upsellBestCase:ubc,
      bestCaseGRR:ra>0?(rn+cm+0.75*tg+dg)/ra:null, worstCaseGRR:ra>0?(rn+cm+dg)/ra:null,
      bestCaseNRR:ra>0?(rn+cm+0.75*tg+dg+ucw+ucm+0.75*utg+0.5*ubc)/ra:null, worstCaseNRR:ra>0?(rn+cm+dg+ucw+ucm)/ra:null};
  }

  // ── Table 1: GRR/NRR metrics ──
  const scen1Cols=SA?`<th class="scen-col">Scenario GRR</th><th class="scen-col">Scenario NRR</th>`:'' ;
  const rows1=podLeads.map(pod=>{
    const b=effPod(pod);if(!b)return'';
    const color=POD_COLORS[pod]||'#6c63ff';
    const ra=b.renewableARR||0;
    const ps=SA?computeScen(b):null;
    const bcnNum=ra>0?(b.renewedARR||0)+(b.renewalCommit||0)+0.75*(b.renewalTNG||0)+(b.downgradedARR||0)+(b.upsellClosedWon||0)+(b.upsellCommit||0)+0.75*(b.upsellTNG||0)+0.5*(b.upsellBestCase||0):0;
    const bcnNumEff=SA&&ps?ps.nrrNum:bcnNum;
    const d105=ra>0?1.05*ra-bcnNumEff:null;
    const d115=ra>0?1.15*ra-bcnNumEff:null;
    const oc=(tab,ft,fv,lbl)=>`openModal('${pod}','${activeQ}','${tab}','${ft}','${fv}','${lbl}')`;
    const scenCells=SA?(ps
      ?`<td class="scen-col">${chipTdInner(ps.grr,false)}</td><td class="scen-col">${chipTdInner(ps.nrr,true)}</td>`
      :`${naTd()}${naTd()}`):'';
    return`<tr>
      <td onclick="${oc('r','','','All Deals')}" style="cursor:pointer"><div class="pn"><div class="pa" style="background:${color}">${pod.slice(0,2).toUpperCase()}</div><div><div class="av">${pod}</div><div class="pm">${b.renewalDealCount||0}R · ${b.upsellDealCount||0}U</div></div></div></td>
      ${ra>0?chipTdClick(b.bestCaseGRR,false,oc('r','','','All Deals')):naTd()}
      ${ra>0?chipTdClick(b.worstCaseGRR,false,oc('r','','','All Deals')):naTd()}
      ${ra>0?chipTdClick(b.bestCaseNRR,true,oc('r','','','All Deals')):naTd()}
      ${ra>0?chipTdClick(b.worstCaseNRR,true,oc('r','','','All Deals')):naTd()}
      ${d105!==null?deltaTd(d105):naTd()}
      ${d115!==null?deltaTd(d115):naTd()}
      ${scenCells}
    </tr>`;
  }).join('');
  const tScenCells=SA?(tScen
    ?`<td class="scen-col">${chipTdInner(tScen.grr,false)}</td><td class="scen-col">${chipTdInner(tScen.nrr,true)}</td>`
    :`${naTd()}${naTd()}`):'';
  const totRow1=`<tr class="trow"><td>ALL PODS</td>
    ${tRA>0?chipTd(tBcgV,false):naTd()}${tRA>0?chipTd(tWcgV,false):naTd()}
    ${tRA>0?chipTd(tBcnV,true):naTd()}${tRA>0?chipTd(tWcnV,true):naTd()}
    ${tD105Eff!==null?deltaTd(tD105Eff):naTd()}${tD115Eff!==null?deltaTd(tD115Eff):naTd()}
    ${tScenCells}</tr>`;

  // ── Table 2: ARR breakdown ──
  const rows2=podLeads.map(pod=>{
    const b=effPod(pod);if(!b)return'';
    const color=POD_COLORS[pod]||'#6c63ff';
    const ra=b.renewableARR||0;
    const chArr=podChurned[pod]||0;
    const oc=(tab,ft,fv,lbl)=>`openModal('${pod}','${activeQ}','${tab}','${ft}','${fv}','${lbl}')`;
    const tdC=(tab,ft,fv,lbl,val)=>`<td onclick="${oc(tab,ft,fv,lbl)}" style="cursor:pointer"><span class="av">${fmt(val)}</span></td>`;
    return`<tr>
      <td onclick="${oc('r','','','All Deals')}" style="cursor:pointer"><div class="pn"><div class="pa" style="background:${color}">${pod.slice(0,2).toUpperCase()}</div><div class="av">${pod}</div></div></td>
      ${tdC('r','','','All Deals',ra)}
      ${tdC('r','stage','Renewed','Renewed',b.renewedARR)}
      ${tdC('r','fc','commit','Commit',b.renewalCommit)}
      ${tdC('r','fc','touch','Touch n Go',b.renewalTNG)}
      ${tdC('r','fc','downgrade','Downgraded',b.downgradedARR)}
      ${tdC('r','stage','Churned','Churned',chArr)}
      ${tdC('u','stage','closed won','Upsell Closed Won',b.upsellClosedWon)}
      ${tdC('u','fc','commit','Upsell Commit',b.upsellCommit)}
      ${tdC('u','fc','touch','Upsell Touch n Go',b.upsellTNG)}
      ${tdC('u','fc','best case','Upsell Best Case',b.upsellBestCase)}
    </tr>`;
  }).join('');
  const totRow2=`<tr class="trow"><td>ALL PODS</td>
    <td>${fmt(tRA)}</td><td>${fmt(tRn)}</td><td>${fmt(tCm)}</td><td>${fmt(tTG)}</td><td>${fmt(tDg)}</td>
    <td>${fmt(tCh)}</td><td>${fmt(tUCW)}</td><td>${fmt(tUCm)}</td><td>${fmt(tUTG)}</td><td>${fmt(tUBC)}</td></tr>`;

  const podViewToggle='';

  const ovrBanner='';
  const utilTabsHTML=`<div style="display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:12px;font-weight:700">
    <div onclick="setOverrideMode(false)" style="padding:5px 12px;cursor:pointer;background:${overrideMode?'':'var(--accent)'};color:${overrideMode?'var(--muted)':'#fff'};transition:all .2s">Baseline</div>
    <div onclick="setOverrideMode(true)" style="padding:5px 12px;cursor:pointer;background:${overrideMode?'var(--accent)':''};color:${overrideMode?'#fff':'var(--muted)'};transition:all .2s;border-left:1px solid var(--border)">Override</div>
  </div>`;
  document.getElementById('app').innerHTML=`
    <div class="qtabs"><div style="display:flex;gap:6px">${tabsHTML}</div>${utilTabsHTML}</div>
    <div class="sumbar">${sumbar}</div>
    <div class="tsec">
      ${ovrBanner}
      ${scenPanel}
      ${podViewToggle}
      <div class="ttl">Pod Metrics — ${activeQ}</div>
      <div class="mwrap" style="overflow-x:auto"><table style="table-layout:fixed">
        <thead><tr><th style="width:180px">Pod Lead</th><th style="width:90px">BC GRR</th><th style="width:90px">WC GRR</th><th style="width:90px">BC NRR</th><th style="width:90px">WC NRR</th><th style="width:120px">Δ to 105% NRR</th><th style="width:120px">Δ to 115% NRR</th>${scen1Cols}</tr></thead>
        <tbody>${rows1}${totRow1}</tbody>
      </table></div>
      <div style="height:20px"></div>
      <div class="ttl">ARR Breakdown — ${activeQ}</div>
      <div class="mwrap" style="overflow-x:auto"><table style="table-layout:fixed">
        <thead><tr><th style="width:160px">Pod Lead</th><th style="width:96px">Renewable</th><th style="width:96px">Renewed</th><th style="width:96px">Commit</th><th style="width:96px">TNG</th><th style="width:96px">Downgraded</th><th style="width:96px">Churned</th><th style="width:96px">Upsell CW</th><th style="width:96px">Upsell Commit</th><th style="width:96px">Upsell TNG</th><th style="width:96px">Upsell BC</th></tr></thead>
        <tbody>${rows2}${totRow2}</tbody>
      </table></div>
    </div>`;
}

function switchQ(q){activeQ=q;render();}
function pct(v){return(v*100).toFixed(1)+'%';}
function fmt(v){if(!v||v===0)return'—';if(v>=1e6)return'$'+(v/1e6).toFixed(2)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(1)+'K';return'$'+Math.round(v).toLocaleString();}
function chipTd(val,isNRR){const cls=val>=(isNRR?1.15:0.87)?'green':val>=(isNRR?1.05:0.85)?'yellow':'red';return`<td><span class="chip ${cls}">${pct(val)}</span></td>`;}
function chipTdClick(val,isNRR,oc){const cls=val>=(isNRR?1.15:0.87)?'green':val>=(isNRR?1.05:0.85)?'yellow':'red';return`<td onclick="${oc}" style="cursor:pointer"><span class="chip ${cls}">${pct(val)}</span></td>`;}
function chipTdInner(val,isNRR){const cls=val>=(isNRR?1.15:0.87)?'green':val>=(isNRR?1.05:0.85)?'yellow':'red';return`<span class="chip ${cls}">${pct(val)}</span>`;}
function naTd(){return`<td><span class="chip na">—</span></td>`;}
function deltaTd(delta){
  // positive delta = gap (need more ARR to hit target) → red
  // negative delta = surplus (already past target) → green
  const cls=delta<=0?'green':'red';
  const sign=delta<=0?'+':'';
  const label=delta<=0?sign+fmt(-delta)+' ahead':fmt(delta)+' needed';
  return`<td><span class="chip ${cls}" style="min-width:90px;font-size:12px">${label}</span></td>`;
}

  if(mtbs)mtbs.style.display='none';
  renderAMDrillModal();

function renderAMDrillModal(){
  if(!amDrillParams||!DATA)return;
  const {type,value,label}=amDrillParams;
  const FY=['May-26','Jun-26','Jul-26','Aug-26','Sep-26','Oct-26','Nov-26','Dec-26','Jan-27','Feb-27','Mar-27','Apr-27'];
  let deals=(DATA.upsellDeals||[]).filter(d=>{
    const is1x=d.oneTimeFee===true||(d.oneTimeFeeRaw||'').toLowerCase()==='yes';
    if(is1x)return false;
    const stL=(d.dealStage||'').toLowerCase();
    const isCL=stL==='closed lost';
    const isCW=stL==='closed won';
    const isOpen=!isCL&&!isCW;
    const fl=(d.forecastCategory||'').toLowerCase();
    // AM table – cell-specific
    if(type==='am-all')  return FY.includes(d.closeMonth||'')&&getAMName(d.podLead)===value&&!isCL;
    if(type==='am-cw')   return FY.includes(d.closeMonth||'')&&getAMName(d.podLead)===value&&isCW;
    if(type==='am-pipe') return FY.includes(d.closeMonth||'')&&getAMName(d.podLead)===value&&isOpen;
    if(type==='am-cw-q'){
      const qNum=parseInt((activeQ||'Q1').charAt(1))||1;
      const qMonths=new Set(FY.slice((qNum-1)*3,qNum*3));
      return qMonths.has(d.closeMonth||'')&&getAMName(d.podLead)===value&&isCW;
    }
    // Monthly Performance – cell-specific
    if(type==='month-cw')  return d.closeMonth===value&&isCW;
    if(type==='month-pipe')return d.closeMonth===value&&isOpen;
    // Monthly Forecast by Pod – cell-specific
    if(type==='pod-cw'){
      const sep=value.lastIndexOf('|');const pod=value.slice(0,sep),mon=value.slice(sep+1);
      return (pod==='All Pods'||d.podLead===pod)&&d.closeMonth===mon&&isCW;
    }
    if(type==='pod-fc'){
      const parts=value.split('|');const pod=parts[0],mon=parts[1],fcKey=parts[2];
      const fcMatch=fcKey==='commit'?fl==='commit':fcKey==='best'?fl.includes('best'):fcKey==='touch'?fl.includes('touch'):fcKey==='pipeline'?fl==='pipeline':true;
      return (pod==='All Pods'||d.podLead===pod)&&d.closeMonth===mon&&isOpen&&fcMatch;
    }
    if(type==='pod-all'){
      const sep=value.lastIndexOf('|');const pod=value.slice(0,sep),mon=value.slice(sep+1);
      return (pod==='All Pods'||d.podLead===pod)&&d.closeMonth===mon&&!isCL;
    }
    return FY.includes(d.closeMonth||'')&&!isCL;
  });
  const fcPri=fc=>{const f=(fc||'').toLowerCase();if(f==='commit')return 0;if(f.includes('best'))return 1;if(f.includes('touch'))return 2;if(f==='pipeline')return 3;return 4;};
  deals=deals.slice().sort((a,b)=>{
    const aS=(a.dealStage||'').toLowerCase(),bS=(b.dealStage||'').toLowerCase();
    const aCL=aS==='closed lost',bCL=bS==='closed lost';if(aCL!==bCL)return aCL?1:-1;
    const aCW=aS==='closed won',bCW=bS==='closed won';if(aCW!==bCW)return aCW?1:-1;
    const pa=fcPri(a.forecastCategory),pb=fcPri(b.forecastCategory);if(pa!==pb)return pa-pb;
    return(b.effectiveARR||b.annualisedARR||b.amount||0)-(a.effectiveARR||a.annualisedARR||a.amount||0);
  });
  const totalARR=deals.reduce((s,d)=>s+(d.effectiveARR||d.annualisedARR||d.amount||0),0);
  const rows=deals.map(d=>{
    const arr=d.effectiveARR||d.annualisedARR||d.amount||0;
    const stL=(d.dealStage||'').toLowerCase();
    const isCl=stL==='closed won'||stL==='closed lost';
    const fcCell=isCl?`<span class="tag pp">—</span>`:fcU(d.forecastCategory);
    return`<tr>
      <td style="max-width:200px;word-break:break-word;font-weight:500">${d.company||'—'}</td>
      <td style="color:var(--muted);font-size:11px;max-width:160px;word-break:break-word">${d.dealName||'—'}</td>
      <td style="color:var(--muted)">${d.dealOwner||'—'}</td>
      <td>${stgU(d.dealStage)}</td><td>${fcCell}</td>
      <td style="color:var(--muted)">${d.closeMonth||'—'}</td>
      <td style="text-align:right;font-weight:600">${fmt(arr)}</td>
      <td style="font-size:11px">${d.upsellType||'—'}</td>
      <td>${(d.amQualified||'').toLowerCase()==='yes'?'<span class="tag cm">CSQL</span>':''}</td>
    </tr>`;
  }).join('');
  document.getElementById('mTitle').textContent=label;
  document.getElementById('mSub').innerHTML=`${deals.length} deals · Total ARR: <strong style="color:var(--green)">${fmt(totalARR)}</strong>`;
  document.getElementById('mBody').innerHTML=deals.length===0?
    `<div class="empty">No upsell deals found</div>`:
    `<div class="dw"><table class="dt">
      <thead><tr>
        <th>Company</th><th>Deal Name</th><th>Owner</th><th>Stage</th>
        <th>FC</th><th>Month</th><th style="text-align:right">ARR</th>
        <th>Upsell Type</th><th>AM Qual</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function gc(v){return v>=0.87?'green':v>=0.85?'yellow':'red';}
function nc(v){return v>=1.15?'green':v>=1.05?'yellow':'red';}
function stgR(s){const m={'Renewed':'rn','Churned':'ch','Contracting':'cm'};return`<span class="tag ${m[s]||'pp'}">${s||'—'}</span>`;}
function fcR(f){const fl=(f||'').toLowerCase();const c=fl==='commit'?'cm':fl.includes('touch')?'tg':fl==='downgrade'?'dn':fl==='churn'?'ch':fl.includes('best')?'bc':'pp';return`<span class="tag ${c}">${f||'—'}</span>`;}
function stgU(s){const sl=(s||'').toLowerCase();const c=sl==='closed won'?'cw':sl==='closed lost'?'ch':sl==='contracting'?'cm':'pp';return`<span class="tag ${c}">${s||'—'}</span>`;}
function fcU(f){const fl=(f||'').toLowerCase();const c=fl==='commit'?'cm':fl.includes('touch')?'tg':fl.includes('best')?'bc':'pp';return`<span class="tag ${c}">${f||'—'}</span>`;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ── AM helpers ────────────────────────────────────────────────────────────────
function getAMName(pod){const p=(pod||'').trim();if(p==='Rahul'||p==='Abhilash')return'Rahul Shah';if(p==='Alice'||p==='Muskan')return'Ajay';return null;}
function setAMPodFilter(pod){amPodFilter=pod;renderAM();}
function setAMTarget(v){
  // accepts "3M","3000K","3000000","$3M" etc.
  const s=(v||'').replace(/[$,\s]/g,'').toUpperCase();
  let n=parseFloat(s);
  if(isNaN(n))return;
  if(s.endsWith('M'))n*=1e6;
  else if(s.endsWith('K'))n*=1e3;
  n=Math.round(n/12); // interpret as annual → convert to monthly
  if(n>0){amMonthlyTarget=n;renderAM();}
}

// ── AM Dashboard ──────────────────────────────────────────────────────────────
function renderAM(){
  if(!DATA){document.getElementById('app').innerHTML=`<div class="log-page"><p style="color:var(--muted);font-size:13px">Load data first to see the AM Dashboard.</p></div>`;return;}
  const upsellDeals=DATA.upsellDeals||[];
  const annualTarget=amMonthlyTarget*12;
  const SA=isScenActive();
  // For each open deal, determine if scenario reclassifies it:
  // 'won' → treat as Closed Won (CW ARR goes up, open pipeline drops)
  // 'lost' → treat as Closed Lost (CW ARR unchanged, open pipeline drops)
  // null → open pipeline as normal
  function scenClass(fc){
    const f=(fc||'').toLowerCase();
    if(f==='commit'){if(scenario.upsellCommit==='won')return'won';if(scenario.upsellCommit==='lost')return'lost';}
    if(f.includes('touch')){if(scenario.upsellTNG==='won')return'won';if(scenario.upsellTNG==='lost')return'lost';}
    if(f.includes('best')){if(scenario.upsellBC==='won')return'won';if(scenario.upsellBC==='lost')return'lost';}
    return null;
  }

  // FY27 months: Q1=May/Jun/Jul, Q2=Aug/Sep/Oct, Q3=Nov/Dec/Jan, Q4=Feb/Mar/Apr (FY runs May 2026–Apr 2027)
  const FY_MONTHS=['May-26','Jun-26','Jul-26','Aug-26','Sep-26','Oct-26','Nov-26','Dec-26','Jan-27','Feb-27','Mar-27','Apr-27'];
  const MO_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function mOrd(m){const[mn,yr]=m.split('-');return parseInt('20'+yr)*12+MO_NAMES.indexOf(mn);}

  // Current month in IST for YTD
  const now=new Date();
  const istNow=new Date(now.getTime()+(5.5*60-now.getTimezoneOffset())*60000);
  const todayMon=MO_NAMES[istNow.getMonth()]+'-'+String(istNow.getFullYear()).slice(2);
  const todayOrd=mOrd(todayMon);
  const ytdSet=new Set(FY_MONTHS.filter(m=>mOrd(m)<=todayOrd));

  // FC weight for weighted pipeline column (baseline)
  function wt(fc){
    const f=(fc||'').toLowerCase();
    if(f==='commit')return 1.0;if(f.includes('touch'))return 0.75;if(f.includes('best'))return 0.5;if(f==='pipeline')return 0.1;return 0;
  }

  // Aggregation: baseline + scenario side-by-side
  let cwARRYTD=0,cw1xYTD=0,openPipeFY=0;
  let sCwARRYTD=0,sCw1xYTD=0,sOpenPipeFY=0;
  const AMS=['Rahul Shah','Ajay'];
  const amAgg={};
  const qNum=parseInt((activeQ||'Q1').charAt(1))||1;
  const currQMonths=FY_MONTHS.slice((qNum-1)*3,qNum*3);
  const currQSet=new Set(currQMonths);
  const quarterlyTarget=amMonthlyTarget*3;
  AMS.forEach(a=>amAgg[a]={cwARR:0,openPipe:0,sCwARR:0,sOpenPipe:0,cwARRCurrQ:0,sCwARRCurrQ:0});
  const mAgg={};
  FY_MONTHS.forEach(m=>mAgg[m]={cwARR:0,cw1x:0,openPipe:0,weighted:0,sCwARR:0,sCw1x:0,sOpenPipe:0});
  const POD_LEADS=['Rahul','Abhilash','Alice','Muskan'];
  const podAgg={};
  POD_LEADS.forEach(pod=>{podAgg[pod]={};FY_MONTHS.forEach(m=>podAgg[pod][m]={cw:0,commit:0,bc:0,tng:0,pipe:0,nf:0,unspec:0});});

  for(const d of upsellDeals){
    const am=getAMName(d.podLead);
    if(!am)continue;
    const stL=(d.dealStage||'').toLowerCase();
    const isCW=stL==='closed won';
    const isCL=stL==='closed lost';
    const isClosed=isCW||isCL;
    const is1x=d.oneTimeFee===true||(d.oneTimeFeeRaw||'').toLowerCase()==='yes';
    const arr=d.effectiveARR||d.annualisedARR||d.amount||0;
    const mon=d.closeMonth||'';
    const inFY=FY_MONTHS.includes(mon);
    const isYTD=ytdSet.has(mon);

    // Scenario reclassification for open deals
    const sc=!isClosed?scenClass(d.forecastCategory):null; // 'won','lost', or null
    // Scenario-effective status
    const sIsCW=isCW||(sc==='won');
    const sIsOpen=!isClosed&&sc===null;

    // Baseline KPIs
    if(isCW&&isYTD){if(is1x)cw1xYTD+=arr;else cwARRYTD+=arr;}
    if(!isClosed&&!is1x)openPipeFY+=arr;
    // Scenario KPIs
    if(sIsCW&&isYTD){if(is1x)sCw1xYTD+=arr;else sCwARRYTD+=arr;}
    if(sIsOpen&&!is1x)sOpenPipeFY+=arr;

    // AM table: baseline
    if(isCW&&!is1x)amAgg[am].cwARR+=arr;
    if(!isClosed&&!is1x)amAgg[am].openPipe+=arr;
    if(isCW&&!is1x&&inFY&&currQSet.has(mon))amAgg[am].cwARRCurrQ+=arr;
    // AM table: scenario
    if(sIsCW&&!is1x)amAgg[am].sCwARR+=arr;
    if(sIsOpen&&!is1x)amAgg[am].sOpenPipe+=arr;
    if(sIsCW&&!is1x&&inFY&&currQSet.has(mon))amAgg[am].sCwARRCurrQ+=arr;

    // Monthly: baseline
    if(inFY){
      if(isCW){if(is1x)mAgg[mon].cw1x+=arr;else mAgg[mon].cwARR+=arr;}
      if(!isClosed&&!is1x){mAgg[mon].openPipe+=arr;mAgg[mon].weighted+=arr*wt(d.forecastCategory);}
    }
    // Monthly: scenario
    if(inFY){
      if(sIsCW){if(is1x)mAgg[mon].sCw1x+=arr;else mAgg[mon].sCwARR+=arr;}
      if(sIsOpen&&!is1x)mAgg[mon].sOpenPipe+=arr;
    }

    // Pod breakdown — recurring only (exclude 1x)
    if(!is1x&&d.podLead&&podAgg[d.podLead]&&inFY){
      const fcL=(d.forecastCategory||'').toLowerCase();
      const pm=podAgg[d.podLead][mon];
      if(isCW)pm.cw+=arr;
      else if(!isCL){
        if(fcL==='commit')pm.commit+=arr;
        else if(fcL.includes('best'))pm.bc+=arr;
        else if(fcL.includes('touch'))pm.tng+=arr;
        else if(fcL==='pipeline')pm.pipe+=arr;
        else if(fcL.includes('not forecast')||fcL.includes('no forecast'))pm.nf+=arr;
        else pm.unspec+=arr;
      }
    }
  }

  const f=v=>v?fmt(v):'—';
  // Which values to display: scenario or baseline
  const dCwARRYTD=SA?sCwARRYTD:cwARRYTD;
  const dCw1xYTD=SA?sCw1xYTD:cw1xYTD;
  const dOpenPipeFY=SA?sOpenPipeFY:openPipeFY;
  const pctT=annualTarget>0?dCwARRYTD/annualTarget:0;
  const cwARRCurrQTotal=AMS.reduce((s,a)=>s+(SA?amAgg[a].sCwARRCurrQ:amAgg[a].cwARRCurrQ),0);
  const pctQ=quarterlyTarget>0?cwARRCurrQTotal/quarterlyTarget:0;

  // ── Section 1: KPI tiles ──
  const annualTargetDisp='$'+(annualTarget>=1e6?(annualTarget/1e6).toFixed(1)+'M':(annualTarget/1e3).toFixed(0)+'K');
  const monthlyDisp='$'+(amMonthlyTarget>=1e3?(amMonthlyTarget/1e3).toFixed(0)+'K':amMonthlyTarget);
  const kpiSection=`<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;padding:16px 32px;">
    <div class="sc hi" style="cursor:text" title="Click value to edit annual target">
      <div class="l">Annual Target</div>
      <div class="v" style="color:var(--accent)">
        <input id="amTargetInp" type="text" value="${annualTargetDisp}"
          style="background:none;border:none;border-bottom:1px dashed var(--border);color:var(--accent);font-size:22px;font-weight:700;width:100%;outline:none;padding:0;cursor:text"
          onblur="setAMTarget(this.value)" onkeydown="if(event.key==='Enter')this.blur()" onclick="this.select()"/>
      </div>
      <div class="s">${monthlyDisp} / month · editable</div>
    </div>
    <div class="sc hi${SA?' scen-col':''}"><div class="l">${SA?'⚡ ':''} CW ARR YTD</div><div class="v" style="color:var(--green)">${f(dCwARRYTD)}</div><div class="s">recurring · YTD</div></div>
    <div class="sc hi"><div class="l">CW 1x YTD</div><div class="v" style="color:var(--accent2)">${f(dCw1xYTD)}</div><div class="s">1x fees · YTD</div></div>
    <div class="sc hi${SA?' scen-col':''}"><div class="l">${SA?'⚡ ':''} Open Pipeline FY</div><div class="v" style="color:var(--blue)">${f(dOpenPipeFY)}</div><div class="s">${SA?'scenario-adjusted':'recurring open deals'}</div></div>
    <div class="sc hi${SA?' scen-col':''}"><div class="l">${SA?'⚡ ':''} % of Q Target (${activeQ.split('-')[0]})</div>
      <div class="v" style="color:${pctQ>=1?'var(--green)':pctQ>=0.5?'var(--yellow)':'var(--red)'}">${(pctQ*100).toFixed(1)}%</div>
      <div class="s">CW ARR vs ${'$'+(quarterlyTarget>=1e6?(quarterlyTarget/1e6).toFixed(1)+'M':(quarterlyTarget/1e3).toFixed(0)+'K')} Q target</div>
    </div>
    <div class="sc hi${SA?' scen-col':''}"><div class="l">${SA?'⚡ ':''} % of Annual Target</div>
      <div class="v" style="color:${pctT>=1?'var(--green)':pctT>=0.5?'var(--yellow)':'var(--red)'}">${(pctT*100).toFixed(1)}%</div>
      <div class="s">CW ARR vs ${annualTargetDisp}</div>
    </div>
  </div>`;

  // Pre-compute scenario result bar using current-quarter pod totals (always shown, same as ALL dashboard)
  let amScenResultHTML='';
  {
    const qd=DATA.aggregates&&DATA.aggregates[activeQ]||{};
    const pods=Object.keys(qd);
    let sRA=0,sRn=0,sCm=0,sTG=0,sDg=0,sUCW=0,sUCm=0,sUTG=0,sUBC=0;
    pods.forEach(pod=>{const b=qd[pod]||{};sRA+=b.renewableARR||0;sRn+=b.renewedARR||0;sCm+=b.renewalCommit||0;sTG+=b.renewalTNG||0;sDg+=b.downgradedARR||0;sUCW+=b.upsellClosedWon||0;sUCm+=b.upsellCommit||0;sUTG+=b.upsellTNG||0;sUBC+=b.upsellBestCase||0;});
    if(sRA>0){
      const sBcgV=(sRn+sCm+0.75*sTG+sDg)/sRA;
      const sBcnV=(sRn+sCm+0.75*sTG+sDg+sUCW+sUCm+0.75*sUTG+0.5*sUBC)/sRA;
      const sBucket={renewableARR:sRA,renewedARR:sRn,renewalCommit:sCm,renewalTNG:sTG,downgradedARR:sDg,upsellClosedWon:sUCW,upsellCommit:sUCm,upsellTNG:sUTG,upsellBestCase:sUBC};
      const sScen=computeScen(sBucket);
      if(sScen){
        const pct=v=>(v*100).toFixed(1)+'%';
        amScenResultHTML=`<div class="scen-result">
          <div class="sr-item"><div class="sr-label">Scenario GRR (All Pods)</div>
            <div class="sr-val" style="color:var(--accent)">${pct(sScen.grr)}</div>
            <div class="sr-delta" style="color:${sScen.grr>=sBcgV?'var(--green)':'var(--red)'}">${sScen.grr>=sBcgV?'▲':'▼'} ${pct(Math.abs(sScen.grr-sBcgV))} vs BC GRR</div>
          </div>
          <div class="sr-sep"></div>
          <div class="sr-item"><div class="sr-label">Scenario NRR (All Pods)</div>
            <div class="sr-val" style="color:var(--accent2)">${pct(sScen.nrr)}</div>
            <div class="sr-delta" style="color:${sScen.nrr>=sBcnV?'var(--green)':'var(--red)'}">${sScen.nrr>=sBcnV?'▲':'▼'} ${pct(Math.abs(sScen.nrr-sBcnV))} vs BC NRR</div>
          </div>
          <div class="sr-sep"></div>
          <div class="sr-item"><div class="sr-label">Δ to 105% NRR</div>
            <div class="sr-val" style="font-size:16px;color:${sScen.nrrNum>=1.05*sRA?'var(--green)':'var(--red)'}">${sScen.nrrNum>=1.05*sRA?'+'+fmt(sScen.nrrNum-1.05*sRA)+' ahead':fmt(1.05*sRA-sScen.nrrNum)+' needed'}</div>
          </div>
          <div class="sr-sep"></div>
          <div class="sr-item"><div class="sr-label">Δ to 115% NRR</div>
            <div class="sr-val" style="font-size:16px;color:${sScen.nrrNum>=1.15*sRA?'var(--green)':'var(--red)'}">${sScen.nrrNum>=1.15*sRA?'+'+fmt(sScen.nrrNum-1.15*sRA)+' ahead':fmt(1.15*sRA-sScen.nrrNum)+' needed'}</div>
          </div>
        </div>`;
      }
    }
  }

  // ── Scenario panel (same style/controls as main dashboard, rendered below tiles) ──
  const amScenPanel=scenarioOpen?`<div class="scen-panel" style="margin:0 32px 16px">
    <div class="scen-hdr">
      <div class="scen-hdr-left">⚡ What-If Scenario${SA?`<span class="scen-active-badge">ACTIVE</span>`:''}
        <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:4px">Reclassifies open deals as won or lost — updates all AM tables</span>
      </div>
      <button class="scen-reset" onclick="resetScenario()">Reset All</button>
    </div>
    <div class="scen-body">
      <table class="scen-tbl">
        <thead><tr><th></th><th>Neutral</th><th>All Won</th><th>All Lost</th></tr></thead>
        <tbody>
          <tr class="scen-section-row"><td colspan="4">Renewal</td></tr>
          ${stgHTML('TNG','renewalTNG')}${stgHTML('Commit','renewalCommit')}
          <tr class="scen-section-row"><td colspan="4">Upsell</td></tr>
          ${stgHTML('TNG','upsellTNG')}${stgHTML('Commit','upsellCommit')}${stgHTML('Best Case','upsellBC')}
        </tbody>
      </table>
    </div>
    ${amScenResultHTML}
  </div>`:'';

  // ── Section 2: Performance by AM ──
  const cwColHdr=SA?'⚡ CW ARR (FY)':'CW ARR (FY)';
  const pipeColHdr=SA?'⚡ Open Pipeline':'Open Pipeline (FY)';
  const amRows=AMS.map(am=>{
    const b=amAgg[am];
    const dispCW=SA?b.sCwARR:b.cwARR;
    const dispPipe=SA?b.sOpenPipe:b.openPipe;
    const dispCWQ=SA?b.sCwARRCurrQ:b.cwARRCurrQ;
    const p=annualTarget>0?dispCW/annualTarget:0;
    const pQ=quarterlyTarget>0?dispCWQ/quarterlyTarget:0;
    const currQLabel=activeQ.split('-')[0];
    return`<tr>
      <td style="font-weight:600;color:var(--text);cursor:pointer;text-decoration:underline;text-decoration-color:var(--border)" onclick="openAMDrill('am-all','${am}','${am} — All Recurring Upsells FY27')" title="All non-lost deals">${am}</td>
      <td style="text-align:right;color:${SA?'var(--accent)':'var(--green)'};cursor:pointer" onclick="openAMDrill('am-cw','${am}','${am} — Closed Won FY27')" title="Closed Won deals (full FY)">${f(dispCW)}</td>
      <td style="text-align:right;color:var(--blue);cursor:pointer" onclick="openAMDrill('am-pipe','${am}','${am} — Open Pipeline FY27')" title="Open deals">${f(dispPipe)}</td>
      <td style="text-align:right;color:${SA?'var(--accent)':'var(--green)'};cursor:pointer" onclick="openAMDrill('am-cw-q','${am}','${am} — Closed Won ${currQLabel}')" title="Closed Won in ${currQLabel} only">${f(dispCWQ)}</td>
      <td style="text-align:right;color:${pQ>=1?'var(--green)':pQ>=0.5?'var(--yellow)':'var(--red)'}">${(pQ*100).toFixed(1)}%</td>
      <td style="text-align:right;color:${p>=1?'var(--green)':p>=0.5?'var(--yellow)':'var(--red)'}">${(p*100).toFixed(1)}%</td>
    </tr>`;
  }).join('');
  const amTotCW=AMS.reduce((s,a)=>s+(SA?amAgg[a].sCwARR:amAgg[a].cwARR),0);
  const amTotPipe=AMS.reduce((s,a)=>s+(SA?amAgg[a].sOpenPipe:amAgg[a].openPipe),0);
  const amTotCWQ=AMS.reduce((s,a)=>s+(SA?amAgg[a].sCwARRCurrQ:amAgg[a].cwARRCurrQ),0);
  const amTotPct=annualTarget>0?amTotCW/annualTarget:0;
  const amTotPctQ=quarterlyTarget>0?amTotCWQ/quarterlyTarget:0;
  const currQLabel=activeQ.split('-')[0];
  const amTotRow=`<tr class="trow"><td>TOTAL</td><td style="text-align:right">${f(amTotCW)}</td><td style="text-align:right">${f(amTotPipe)}</td><td style="text-align:right">${f(amTotCWQ)}</td><td style="text-align:right">${(amTotPctQ*100).toFixed(1)}%</td><td style="text-align:right">${(amTotPct*100).toFixed(1)}%</td></tr>`;
  const amSection=`<div class="tsec">
    <div class="ttl">Performance by AM — FY27 to Date${SA?' <span style="color:var(--accent);font-size:10px;font-weight:700">⚡ SCENARIO</span>':''}</div>
    <div class="mwrap"><table>
      <thead><tr>
        <th style="text-align:left">Account Manager</th>
        <th style="text-align:right${SA?';color:var(--accent)':''}">${cwColHdr}</th>
        <th style="text-align:right">${pipeColHdr}</th>
        <th style="text-align:right${SA?';color:var(--accent)':''}">CW ARR (${currQLabel})</th>
        <th style="text-align:right">% of Q Target (${currQLabel})</th>
        <th style="text-align:right">% of Annual Target</th>
      </tr></thead>
      <tbody>${amRows}${amTotRow}</tbody>
    </table></div>
  </div>`;

  // ── Section 3: Monthly Performance ──
  const mRows=FY_MONTHS.map(m=>{
    const b=mAgg[m];
    const isYTD=ytdSet.has(m);
    const dCW=SA?b.sCwARR:b.cwARR;
    const dC1x=SA?b.sCw1x:b.cw1x;
    const dPipe=SA?b.sOpenPipe:b.openPipe;
    const deficit=isYTD?Math.max(0,amMonthlyTarget-dCW):0;
    const pctM=amMonthlyTarget>0&&dCW?dCW/amMonthlyTarget:0;
    return`<tr style="${!isYTD?'opacity:.5':''}">
      <td style="font-weight:600">${m}${!isYTD?` <span style="font-size:9px;color:var(--muted);font-weight:400;letter-spacing:.3px">FUTURE</span>`:''}</td>
      <td style="text-align:right;color:var(--muted)">${fmt(amMonthlyTarget)}</td>
      <td style="text-align:right;color:${SA?'var(--accent)':'var(--green)'};cursor:pointer" onclick="openAMDrill('month-cw','${m}','${m} — Closed Won Recurring')" title="Click to see CW deals">${f(dCW)}</td>
      <td style="text-align:right;color:var(--accent2)">${f(dC1x)}</td>
      <td style="text-align:right;color:var(--blue);cursor:pointer" onclick="openAMDrill('month-pipe','${m}','${m} — Open Pipeline Recurring')" title="Click to see open deals">${f(dPipe)}</td>
      <td style="text-align:right">${f(b.weighted)}</td>
      <td style="text-align:right;color:${isYTD&&deficit?'var(--red)':isYTD?'var(--green)':'var(--muted)'}">${isYTD?(deficit?fmt(deficit):'✓'):'—'}</td>
      <td style="text-align:right;color:${pctM>=1?'var(--green)':pctM>=0.5?'var(--yellow)':pctM>0?'var(--red)':'var(--muted)'}">${pctM?(pctM*100).toFixed(1)+'%':'—'}</td>
    </tr>`;
  }).join('');
  const mTotCW=FY_MONTHS.reduce((s,m)=>s+(SA?mAgg[m].sCwARR:mAgg[m].cwARR),0);
  const mTot1x=FY_MONTHS.reduce((s,m)=>s+(SA?mAgg[m].sCw1x:mAgg[m].cw1x),0);
  const mTotPipe=FY_MONTHS.reduce((s,m)=>s+(SA?mAgg[m].sOpenPipe:mAgg[m].openPipe),0);
  const mTotWt=FY_MONTHS.reduce((s,m)=>s+mAgg[m].weighted,0);
  const mTotPct=annualTarget>0&&mTotCW?mTotCW/annualTarget:0;
  const mTotRow=`<tr class="trow"><td>TOTAL FY</td><td style="text-align:right">${fmt(annualTarget)}</td><td style="text-align:right">${f(mTotCW)}</td><td style="text-align:right">${f(mTot1x)}</td><td style="text-align:right">${f(mTotPipe)}</td><td style="text-align:right">${f(mTotWt)}</td><td></td><td style="text-align:right">${mTotPct?(mTotPct*100).toFixed(1)+'%':'—'}</td></tr>`;
  const mSection=`<div class="tsec">
    <div class="ttl">Monthly Performance — FY27${SA?' <span style="color:var(--accent);font-size:10px;font-weight:700">⚡ SCENARIO</span>':''}</div>
    <div class="mwrap" style="overflow-x:auto"><table>
      <thead><tr>
        <th style="text-align:left">Month</th>
        <th style="text-align:right">Target</th>
        <th style="text-align:right${SA?';color:var(--accent)':''}">CW ARR</th>
        <th style="text-align:right">CW 1x</th>
        <th style="text-align:right">Open Pipeline</th>
        <th style="text-align:right">Weighted Pipeline</th>
        <th style="text-align:right">Deficit</th>
        <th style="text-align:right">% of Target</th>
      </tr></thead>
      <tbody>${mRows}${mTotRow}</tbody>
    </table></div>
  </div>`;

  // ── Section 4: Monthly Forecast by Pod ──
  const podTabs=['','Rahul','Abhilash','Alice','Muskan'].map(p=>`<div class="qtab${amPodFilter===p?' active':''}" onclick="setAMPodFilter('${p}')">${p||'All Pods'}</div>`).join('');
  const podsToShow=amPodFilter?[amPodFilter]:POD_LEADS;
  const combined={};
  FY_MONTHS.forEach(m=>{
    combined[m]={cw:0,commit:0,bc:0,tng:0,pipe:0,nf:0,unspec:0};
    podsToShow.forEach(pod=>{
      const pa=podAgg[pod][m];
      combined[m].cw+=pa.cw;combined[m].commit+=pa.commit;combined[m].bc+=pa.bc;
      combined[m].tng+=pa.tng;combined[m].pipe+=pa.pipe;combined[m].nf+=pa.nf;combined[m].unspec+=pa.unspec;
    });
  });
  const fcRows=FY_MONTHS.map(m=>{
    const b=combined[m];
    const total=b.cw+b.commit+b.bc+b.tng+b.pipe+b.nf+b.unspec;
    const isYTD=ytdSet.has(m);
    const _pod=amPodFilter||'All Pods';
    const _podLbl=amPodFilter?amPodFilter+' Pod':'All Pods';
    const _d=(fc,lbl)=>`openAMDrill('pod-fc','${_pod}|${m}|${fc}','${_podLbl} · ${m} — ${lbl}')`;
    return`<tr style="${!isYTD?'opacity:.5':''}">
      <td style="font-weight:600;cursor:pointer" onclick="openAMDrill('pod-all','${_pod}|${m}','${_podLbl} · ${m} — All Deals')" title="All non-lost deals">${m}</td>
      <td style="text-align:right;color:var(--green);cursor:pointer" onclick="openAMDrill('pod-cw','${_pod}|${m}','${_podLbl} · ${m} — Closed Won')" title="Closed Won">${f(b.cw)}</td>
      <td style="text-align:right;color:var(--blue);cursor:pointer" onclick="${_d('commit','Commit')}" title="Commit deals">${f(b.commit)}</td>
      <td style="text-align:right;color:var(--purple);cursor:pointer" onclick="${_d('best','Best Case')}" title="Best Case deals">${f(b.bc)}</td>
      <td style="text-align:right;color:var(--yellow);cursor:pointer" onclick="${_d('touch','TNG')}" title="TNG deals">${f(b.tng)}</td>
      <td style="text-align:right;color:var(--muted);cursor:pointer" onclick="${_d('pipeline','Pipeline')}" title="Pipeline deals">${f(b.pipe)}</td>
      <td style="text-align:right;color:var(--muted)">${f(b.nf)}</td>
      <td style="text-align:right;color:var(--muted)">${f(b.unspec)}</td>
      <td style="text-align:right;font-weight:600;cursor:pointer" onclick="openAMDrill('pod-all','${_pod}|${m}','${_podLbl} · ${m} — All Deals')" title="All non-lost deals">${f(total)}</td>
    </tr>`;
  }).join('');
  const pfTot={cw:0,commit:0,bc:0,tng:0,pipe:0,nf:0,unspec:0};
  FY_MONTHS.forEach(m=>Object.keys(pfTot).forEach(k=>pfTot[k]+=combined[m][k]));
  const pfTotal=Object.values(pfTot).reduce((s,v)=>s+v,0);
  const pfTotRow=`<tr class="trow"><td>TOTAL</td><td style="text-align:right">${f(pfTot.cw)}</td><td style="text-align:right">${f(pfTot.commit)}</td><td style="text-align:right">${f(pfTot.bc)}</td><td style="text-align:right">${f(pfTot.tng)}</td><td style="text-align:right">${f(pfTot.pipe)}</td><td style="text-align:right">${f(pfTot.nf)}</td><td style="text-align:right">${f(pfTot.unspec)}</td><td style="text-align:right">${f(pfTotal)}</td></tr>`;
  const fcLabel=amPodFilter?`${amPodFilter} Pod`:'All Pods';
  const fcSection=`<div class="tsec">
    <div class="ttl">Monthly Forecast by Pod — ${fcLabel}</div>
    <div style="display:flex;gap:6px;margin-bottom:14px">${podTabs}</div>
    <div class="mwrap" style="overflow-x:auto"><table>
      <thead><tr>
        <th style="text-align:left">Month</th>
        <th style="text-align:right">Closed Won</th>
        <th style="text-align:right">Commit</th>
        <th style="text-align:right">Best Case</th>
        <th style="text-align:right">TNG</th>
        <th style="text-align:right">Pipeline</th>
        <th style="text-align:right">Not Forecasted</th>
        <th style="text-align:right">Unspecified</th>
        <th style="text-align:right">Total</th>
      </tr></thead>
      <tbody>${fcRows}${pfTotRow}</tbody>
    </table></div>
  </div>`;

  // Spacer — midway (about half the quarter-row height)
  const amSpacer=`<div style="height:44px;padding:8px 32px 0;display:flex;align-items:center">
    <span style="color:var(--muted);font-size:12px;font-weight:500;opacity:.7">Account Management · FY27 (May 2026 – Apr 2027)</span>
  </div>`;
  document.getElementById('app').innerHTML=amSpacer+kpiSection+amScenPanel+amSection+mSection+fcSection;
}
</script>
</body>
</html>
